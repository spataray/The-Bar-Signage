<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T.A. Station - Digital Signage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="images/TAStation-1.JPG">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <style>
        #error-log {
            position: fixed; bottom: 30px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.8); color: white; font-family: monospace;
            font-size: 11px; padding: 10px; border-radius: 5px; z-index: 15000;
            display: none; pointer-events: none; line-height: 1.4;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="error-log"><b>SYSTEM LOG:</b></div>

    <div id="status-indicator">KARAOKE LOCKED</div>

    <!-- Connection Status LED (Bottom Left) -->
    <div id="conn-status-led" title="Firebase Status" style="position: fixed; bottom: 10px; left: 10px; width: 6px; height: 6px; background: #ff4444; border-radius: 50%; box-shadow: 0 0 5px #ff4444; z-index: 10001; transition: all 0.5s ease; opacity: 0.6;"></div>

    <!-- YouTube Status LED (Bottom Right) -->
    <div id="yt-status-led" title="YouTube Status" style="position: fixed; bottom: 10px; right: 10px; width: 6px; height: 6px; background: #ff4444; border-radius: 50%; box-shadow: 0 0 5px #ff4444; z-index: 10001; transition: all 0.5s ease; opacity: 0.6;"></div>

    <div id="app-container">
        <div id="video-section">
            <div id="player"></div>
            <div id="idle-screen">
                <img id="idle-photo" src="images/TAStation-1.JPG" alt="">
                <video id="idle-video" muted playsinline preload="auto"></video>
                <div id="idle-overlay">
                    <div id="idle-logo" class="venue-name-display" style="text-transform: uppercase;">T.A. STATION</div>
                    <div id="idle-tagline">Honolulu, HI</div>
                </div>
            </div>
        </div>

        <div id="ad-sidebar">
            <div class="sidebar-inner">
                <h2 id="ad-title">T.A. Station</h2>
                <p id="ad-desc"></p>
                <img id="ad-flyer" alt="Event Flyer">
                <div class="menu-section" id="menu-content"></div>
                
                <!-- UP NEXT INFO -->
                <div id="up-next-section" style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,204,0,0.3); display: none;">
                    <h3 style="color: var(--bar-gold); font-size: 0.9rem; margin-bottom: 10px; letter-spacing: 2px;">COMING UP NEXT</h3>
                    <div id="up-next-info" style="display: flex; gap: 15px; align-items: center; margin-bottom: 15px;">
                        <img id="up-next-thumb" src="" style="width: 100px; aspect-ratio: 16/9; border-radius: 8px; object-fit: cover; border: 1px solid #444;">
                        <div style="flex: 1; min-width: 0;">
                            <div id="up-next-title" style="font-weight: 900; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white;"></div>
                            <div id="up-next-author" style="font-size: 0.8rem; opacity: 0.6; color: var(--bar-gold);"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Request Song QR Code -->
    <div id="request-qr-container" style="position: fixed; bottom: 105px; right: 20px; z-index: 2100; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 10px; border: 2px solid var(--bar-gold); text-align: center; width: 75px; display: none; flex-direction: column; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: opacity 0.5s ease;">
        <div style="font-size: 0.6rem; color: var(--bar-gold); font-weight: 900; margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase;">Request a Song</div>
        <div id="qr-wrapper" style="background: white; padding: 3px; border-radius: 5px; line-height: 0;">
            <img id="request-qr-img" src="" style="width: 60px; height: 60px; display: block;" alt="QR Code">
        </div>
        <div style="font-size: 0.55rem; margin-top: 5px; opacity: 0.9; font-weight: bold;">Scan with Phone</div>
    </div>

    <div id="ticker-container">
        <div id="version-tag" style="position: absolute; bottom: 2px; right: 5px; font-size: 10px; color: rgba(255,255,255,0.2); z-index: 100;">v1.6.0 (2026-04-18 HST)</div>
        <div id="ticker-row1">
            <div id="weather-display"></div>
            <div class="ticker-wrap">
                <span id="ticker-text"></span>
            </div>
            <div id="clock-display"></div>
        </div>
        <div id="ticker-row2">
            <div class="ticker-wrap">
                <span id="facts-text"></span>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <script src="config.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('service-worker.js');
            });
        }

        var player, playerReady = false, pendingVideoId = null, isLocked = false, hasInteracted = false;
        var tickerMessages = [], tickerIndex = 0, tickerTimer = null, venueId = null, vRef = null, db = null;
        var factsShuffled = [], factIndex = 0, factsTimer = null;
        var funFacts = ["🌍 Japan has more vending machines than people.", "🌍 Honolulu means 'sheltered bay' in Hawaiian.", "🌍 Thailand has never been colonized."];

        function logMsg(msg) {
            var el = document.getElementById("error-log");
            if (el) { el.style.display = "block"; el.innerHTML += "<br>> " + msg; }
            console.log(msg);
        }

        function escHtml(str) { var div = document.createElement('div'); div.textContent = str || ''; return div.innerHTML; }
        function buildTickerMessages(msgs) { if (!msgs) return []; return msgs.slice ? msgs.slice() : Object.values(msgs); }
        
        function saveLocal(key, val) { try { localStorage.setItem("tbs_" + venueId + "_" + key, JSON.stringify(val)); } catch(e) {} }
        function getLocal(key) { try { return JSON.parse(localStorage.getItem("tbs_" + venueId + "_" + key)); } catch(e) { return null; } }

        function updateMenuUI(menu) {
            var el = document.getElementById("menu-content"); if (!el) return;
            if (menu) {
                var h = "<h3>" + (window._currentVenueName || "T.A. Station").toUpperCase() + " MENU</h3>";
                for (var k in menu) h += "<div class='menu-item'><span>" + escHtml(menu[k].name) + "</span><span>" + escHtml(menu[k].price || "") + "</span></div>";
                el.innerHTML = h;
            } else { el.innerHTML = "<h3>MENU</h3><div style='opacity:0.3;text-align:center;'>Set menu in remote</div>"; }
        }

        function updateAdUI(ad) {
            var f = document.getElementById("ad-flyer"), t = document.getElementById("ad-title"), d = document.getElementById("ad-desc");
            if (!f || !t || !d) return;
            if (ad) {
                t.innerText = ad.title || window._currentVenueName || "T.A. Station";
                d.innerText = ad.desc || "";
                if (ad.flyer) { 
                    var url = ad.flyer.trim();
                    var match = url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);
                    if (match) url = 'https://lh3.googleusercontent.com/d/' + match[1];
                    f.src = url; f.style.display = "block"; f.onerror = function() { this.style.display = "none"; }; 
                } else { f.style.display = "none"; }
            }
        }

        function updateVenueNameUI(name) {
            window._currentVenueName = name;
            var d = document.querySelectorAll(".venue-name-display");
            for (var i = 0; i < d.length; i++) {
                d[i].textContent = name;
                if (d[i].id === "idle-logo") d[i].textContent = name.toUpperCase();
            }
            document.title = name + " - Digital Signage";
        }

        function initApp() {
            var urlParams = new URLSearchParams(window.location.search);
            venueId = urlParams.get('v');
            if (!venueId) {
                venueId = Math.random().toString(36).substring(2, 6).toUpperCase();
                var nu = window.location.protocol + "//" + window.location.host + window.location.pathname + "?v=" + venueId;
                window.history.pushState({path:nu},"",nu);
            }

            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            vRef = db.ref("venues/" + venueId);

            updateVenueNameUI(getLocal("venueName") || "T.A. Station");
            updateMenuUI(getLocal("menu"));
            var ct = getLocal("ticker"); if (ct) tickerMessages = buildTickerMessages(ct);
            updateAdUI(getLocal("adConfig"));

            firebase.auth().onAuthStateChanged(function(u) { if (u) initFirebaseListeners(); else firebase.auth().signInAnonymously(); });

            db.ref(".info/connected").on("value", function(s) {
                var led = document.getElementById("conn-status-led"); if (!led) return;
                if (s.val() === true) { led.style.background = "#28a745"; led.style.boxShadow = "0 0 8px #28a745"; }
                else { led.style.background = "#ff4444"; led.style.boxShadow = "0 0 10px #ff4444"; }
            });

            updateClock(); setInterval(updateClock, 1000);
            syncWeather(); setInterval(syncWeather, 600000);
            showFunFact();
            if (tickerMessages.length > 0) showTickerMessage();
            setInterval(function() { if (!isLocked) showAd(); }, 180000);
            
            startIdle();
            if (window.YT && window.YT.Player) onYouTubeIframeAPIReady();
        }

        function initFirebaseListeners() {
            initConnectQR();
            vRef.child("settings/menu").on("value", function(s) { saveLocal("menu", s.val()); updateMenuUI(s.val()); });
            vRef.child("settings/adConfig").on("value", function(s) { saveLocal("adConfig", s.val()); updateAdUI(s.val()); });
            vRef.child("settings/ticker").on("value", function(s) { 
                var m = s.val(); saveLocal("ticker", m); tickerMessages = buildTickerMessages(m);
                if (!tickerTimer && tickerMessages.length > 0) showTickerMessage();
            });
            vRef.child("settings/currentVideoId").on("value", function(s) {
                var vid = s.val(); if (!vid) return;
                if (typeof vid === "object" && vid.id) vid = vid.id;
                if (typeof vid !== "string" || vid.length < 10) return;
                stopIdle();
                if (playerReady && player && player.loadVideoById) {
                    player.loadVideoById(vid);
                } else {
                    pendingVideoId = vid;
                }
            });
            vRef.child("settings/queue").on("value", function(s) {
                var q = s.val() || []; saveLocal("queue", q);
                if (q.length > 0 && document.getElementById("idle-screen").classList.contains("active")) playNext();
            });
            
            // COMMAND LISTENER
            vRef.child("settings/playerCommand").on("value", function(s) {
                var c = s.val(); if (!c) return;
                if (!playerReady || !player) { 
                    console.log("Player not ready, ignoring command:", c.action);
                    return; 
                }
                
                logMsg("CMD Received: " + c.action);
                
                // UNMUTE ON FIRST COMMAND
                if (!hasInteracted && (c.action !== 'mute')) { 
                    player.unMute(); 
                    hasInteracted = true; 
                }
                
                switch (c.action) {
                    case "pause": player.pauseVideo(); break;
                    case "play": player.playVideo(); break;
                    case "next": playNext(); break;
                    case "prev": player.seekTo(0); player.playVideo(); break;
                    case "volume": player.setVolume(c.value); break;
                    case "mute": player.mute(); break;
                    case "unmute": player.unMute(); break;
                    case "slideshow": player.stopVideo(); startIdle(); break;
                    case "fixDisplay": stopIdle(); playNext(); break;
                }
                vRef.child("settings/playerCommand").set(null);
            });
            
            vRef.child("settings/partyMode").on("value", function(s) { document.body.classList.toggle("party-mode", !!s.val()); });
            vRef.child("settings/karaokeLock").on("value", function(s) {
                isLocked = !!s.val(); document.getElementById("status-indicator").style.display = isLocked ? "block" : "none";
                if (isLocked) hideAd();
            });
            vRef.child("settings/remoteRefresh").on("value", function(s) { if (s.val()) { vRef.child("settings/remoteRefresh").set(null); location.reload(); } });
            vRef.child("settings/venueName").on("value", function(s) { saveLocal("venueName", s.val()); updateVenueNameUI(s.val()); });
        }

        function onYouTubeIframeAPIReady() {
            if (player) return;
            player = new YT.Player('player', {
                height: '100%', width: '100%',
                playerVars: { autoplay: 1, controls: 1, rel: 0, enablejsapi: 1, iv_load_policy: 3, modestbranding: 1 },
                events: {
                    onReady: function() { 
                        playerReady = true; 
                        var led = document.getElementById("yt-status-led");
                        if (led) { led.style.background = "#28a745"; led.style.boxShadow = "0 0 8px #28a745"; }
                        player.mute(); 
                        if (pendingVideoId) { player.loadVideoById(pendingVideoId); pendingVideoId = null; } 
                        else {
                            vRef.child("settings/currentVideoId").once("value", function(sn) {
                                var vid = sn.val(); if (vid) player.loadVideoById(vid);
                            });
                        }
                    },
                    onStateChange: function(e) { 
                        if (e.data === YT.PlayerState.PLAYING) {
                            var d = player.getVideoData();
                            if (d && d.video_id) vRef.child('settings/nowPlaying').set({ videoId: d.video_id, title: d.title, author: d.author });
                        }
                        if (e.data === YT.PlayerState.ENDED) playNext();
                        vRef.child('settings/playerState').set(e.data);
                    },
                    onError: function(e) { logMsg("YT Error: " + e.data); setTimeout(playNext, 2000); }
                }
            });
        }

        function playNext() {
            vRef.child('settings/queue').once('value', function(s) {
                var q = s.val() || [];
                if (q.length > 0) {
                    var n = q[0]; vRef.child('settings/queue').set(q.slice(1));
                    stopIdle(); 
                    if (playerReady) player.loadVideoById(n.id); else pendingVideoId = n.id;
                } else { startIdle(); }
            });
        }

        function updateClock() {
            var el = document.getElementById("clock-display");
            if (el) el.innerText = new Date().toLocaleTimeString("en-US", { timeZone: "Pacific/Honolulu", hour: "numeric", minute: "2-digit", hour12: true });
        }

        function syncWeather() {
            fetch("https://api.open-meteo.com/v1/forecast?latitude=21.3069&longitude=-157.8583&current_weather=true&temperature_unit=fahrenheit")
                .then(r => r.json()).then(data => {
                    var el = document.getElementById("weather-display");
                    if (el && data.current_weather) {
                        var icon = { 0: "☀️", 1: "🌤️", 2: "🌤️", 3: "☁️" }[data.current_weather.weathercode] || "🌧️";
                        el.innerText = icon + " " + Math.round(data.current_weather.temperature) + "°F";
                    }
                }).catch(() => {});
        }

        function showTickerMessage() {
            var el = document.getElementById('ticker-text'); if (!el || tickerMessages.length === 0) return;
            el.classList.remove('ticker-visible'); el.classList.add('ticker-hidden');
            setTimeout(function() {
                el.innerText = tickerMessages[tickerIndex]; tickerIndex = (tickerIndex + 1) % tickerMessages.length;
                el.classList.remove('ticker-hidden'); el.classList.add('ticker-visible');
                setTimeout(function() { el.classList.remove('ticker-visible'); el.classList.add('ticker-hidden'); }, 15000);
            }, 800);
            tickerTimer = setTimeout(showTickerMessage, 60000);
        }

        function showFunFact() {
            if (factsShuffled.length === 0) { factsShuffled = funFacts.slice(); factsShuffled.sort(() => Math.random() - 0.5); factIndex = 0; }
            var el = document.getElementById("facts-text"); if (!el) return;
            el.classList.remove("ticker-visible"); el.classList.add("ticker-hidden");
            setTimeout(function() {
                el.innerText = factsShuffled[factIndex]; factIndex = (factIndex + 1) % factsShuffled.length;
                el.classList.remove("ticker-hidden"); el.classList.add("ticker-visible");
                setTimeout(function() { el.classList.remove("ticker-visible"); el.classList.add("ticker-hidden"); }, 15000);
            }, 800);
            factsTimer = setTimeout(showFunFact, 60000);
        }

        function initConnectQR() {
            var q = document.getElementById("request-qr-img"), c = document.getElementById("request-qr-container"); if (!q || !c) return;
            var url = window.location.href.split("?")[0].replace("index.html", "customer.html") + "?v=" + venueId;
            q.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(url);
            vRef.child("settings/showRequestQR").on("value", function(s) { c.style.display = s.val() !== false ? "flex" : "none"; });
        }

        var idleTimer = null, idleIndex = 0;
        function startIdle() { var screen = document.getElementById('idle-screen'); if (screen) screen.classList.add('active'); showAd(true); showIdleItem(); }
        function stopIdle() { var screen = document.getElementById('idle-screen'); if (screen) screen.classList.remove('active'); clearTimeout(idleTimer); }
        function showIdleItem() {
            var p = ['images/TAStation-1.JPG','images/TAStation-2.JPG','images/TAStation-3.JPG'];
            var img = document.getElementById('idle-photo'); if (img) { img.src = p[idleIndex]; idleIndex = (idleIndex + 1) % p.length; idleTimer = setTimeout(showIdleItem, 8000); }
        }

        var adCycleShowMenu = false;
        function showAd(f) {
            var s = document.getElementById("ad-sidebar"), c = document.getElementById("app-container"); if (!s || !c) return;
            c.classList.add("ad-active"); s.className = (f || !adCycleShowMenu) ? "show-flyer" : "show-menu";
            if (!f) adCycleShowMenu = !adCycleShowMenu;
            vRef.child("settings/queue").once("value", function(sn) {
                var q = sn.val() || [], n = document.getElementById("up-next-section");
                if (q.length > 0 && n) {
                    document.getElementById("up-next-title").innerText = q[0].title || "Unknown";
                    document.getElementById("up-next-author").innerText = q[0].author || "";
                    n.style.display = "block";
                } else if (n) { n.style.display = "none"; }
            });
            setTimeout(hideAd, 25000);
        }

        function hideAd() { var s = document.getElementById("ad-sidebar"), c = document.getElementById("app-container"); if (s) s.className = ""; if (c) c.classList.remove("ad-active"); }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initApp); else initApp();
    </script>
</body>
</html>
