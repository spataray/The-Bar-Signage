<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T.A. Station - Digital Signage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="images/TAStation-1.JPG">
</head>
<body>

    <div id="status-indicator">KARAOKE LOCKED</div>

    <div id="disconnect-overlay" style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); color: #ff4444; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; font-family: sans-serif;">
        <div style="font-size: 4rem; margin-bottom: 20px;">⚠️</div>
        <div style="font-size: 1.5rem; font-weight: bold; letter-spacing: 2px;">CONNECTION LOST</div>
        <div style="margin-top: 10px; opacity: 0.7;">Reconnecting to T.A. Station...</div>
    </div>

    <div id="app-container">
        <div id="video-section">
            <div id="player"></div>
            <div id="idle-screen">
                <img id="idle-photo" src="images/TAStation-1.JPG" alt="">
                <video id="idle-video" muted playsinline preload="auto"></video>
                <div id="idle-overlay">
                    <div id="idle-logo">T.A. STATION</div>
                    <div id="idle-tagline">Honolulu, HI</div>
                </div>
            </div>
        </div>

        <div id="ad-sidebar">
            <h2 id="ad-title">T.A. Station</h2>
            <p id="ad-desc"></p>
            <img id="ad-flyer" alt="Event Flyer">
            <div class="menu-section" id="menu-content"></div>
        </div>
    </div>

    <!-- Last Call / Closed Overlay -->
    <div id="lastcall-screen">
        <div id="lastcall-inner">
            <div id="phase-lastcall" class="lc-phase">
                <div class="lc-bell">🔔</div>
                <div class="lc-title">LAST CALL</div>
                <div class="lc-countdown" id="lc-countdown">15:00</div>
                <div class="lc-sub">Bar closes at 2:00 AM &bull; Get your last orders in!</div>
            </div>
            <div id="phase-closed" class="lc-phase">
                <div class="lc-title">MAHALO!</div>
                <div class="lc-closed-sub">We Are Now Closed</div>
                <div class="lc-goodbye" id="lc-goodbye"></div>
                <div class="lc-sub">T.A. Station &bull; Honolulu, HI 🌺</div>
            </div>
        </div>
    </div>

    <!-- AirConsole Overlay -->
    <div id="airconsole-overlay">
        <iframe id="airconsole-frame" src="" allowfullscreen></iframe>
        <button id="airconsole-close" onclick="closeAirConsole()">&#x2715; Back to Signage</button>
    </div>

    <!-- Request Song QR Code -->
    <div id="request-qr-container" style="position: fixed; bottom: 105px; right: 20px; z-index: 90; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 15px; border: 2px solid var(--bar-gold); text-align: center; width: 120px; display: none; flex-direction: column; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: opacity 0.5s ease;">
        <div style="font-size: 0.65rem; color: var(--bar-gold); font-weight: 900; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase;">Request a Song</div>
        <div id="qr-wrapper" style="background: white; padding: 5px; border-radius: 8px; line-height: 0;">
            <img id="request-qr-img" src="" style="width: 100px; height: 100px; display: block;" alt="QR Code">
        </div>
        <div style="font-size: 0.6rem; margin-top: 8px; opacity: 0.7;">Scan with Phone</div>
    </div>

    <div id="ticker-container">
        <div id="version-tag" style="position: absolute; bottom: 2px; right: 5px; font-size: 10px; color: rgba(255,255,255,0.2); z-index: 100;">v1.1.0</div>
        <div id="ticker-row1">
            <div id="weather-display"></div>
            <div class="ticker-wrap">
                <span id="ticker-text"></span>
            </div>
            <div id="clock-display"></div>
        </div>
        <div id="ticker-row2">
            <div class="ticker-wrap">
                <span id="facts-text"></span>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('service-worker.js');
            });
        }

        // 1. DATA SOURCES
        const URL_ADS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSY_76oR-biNXkDm9_MUA-RjKm-DBkeaAX903MPQJHMd2Ku_HFj2Z8w8xDIA-mxl7-Bf474N7MlKdYY/pub?gid=572262531&single=true&output=csv";
        const URL_MENU = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSY_76oR-biNXkDm9_MUA-RjKm-DBkeaAX903MPQJHMd2Ku_HFj2Z8w8xDIA-mxl7-Bf474N7MlKdYY/pub?gid=1406308889&single=true&output=csv";
        const URL_TICKER = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSY_76oR-biNXkDm9_MUA-RjKm-DBkeaAX903MPQJHMd2Ku_HFj2Z8w8xDIA-mxl7-Bf474N7MlKdYY/pub?gid=1639387472&single=true&output=csv";

        // 2. FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyByZx_LjyqpqOl90XMZFWy4eHBQJklCooc",
            authDomain: "ta-station-remote.firebaseapp.com",
            databaseURL: "https://ta-station-remote-default-rtdb.firebaseio.com",
            projectId: "ta-station-remote",
            storageBucket: "ta-station-remote.firebasestorage.app",
            messagingSenderId: "805160829750",
            appId: "1:805160829750:web:9a2a9e1cbf639562aba997"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Connection Monitor
        db.ref(".info/connected").on("value", function(snap) {
            const overlay = document.getElementById('disconnect-overlay');
            if (snap.val() === true) {
                overlay.style.display = 'none';
            } else {
                overlay.style.display = 'flex';
            }
        });

        let player;
        let playerReady = false;
        let pendingVideoId = null;
        let isLocked = false;
        let isPartyMode = false;
        let adCycleShowMenu = false;

        // TV Remote Navigation
        window.addEventListener('keydown', function(e) {
            switch(e.keyCode) {
                case 403: // RED
                    db.ref('settings/karaokeLock').set(!isLocked);
                    break;
                case 404: // GREEN
                    db.ref('settings/forceAd').set(true);
                    break;
                case 405: // YELLOW
                    db.ref('settings/partyMode').set(!isPartyMode);
                    break;
                case 406: // BLUE
                    location.reload();
                    break;
                case 13: // ENTER
                    // Could be used to dismiss overlays
                    break;
            }
        });

        // Auto music mode — fetch playlists from channel, fall back to hardcoded
        let AUTO_PLAYLISTS = ['RDAMVMDy_eP-mqWow', 'RDAMVM77pb0WXAz-Q'];
        let autoMode = false;
        const YT_API_KEY = firebaseConfig.apiKey;

        function fetchChannelPlaylists(handle) {
            const channelUrl = 'https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=' +
                encodeURIComponent(handle) + '&key=' + YT_API_KEY;
            fetch(channelUrl)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    const channelId = data.items && data.items[0] && data.items[0].id;
                    if (!channelId) return;
                    const playlistUrl = 'https://www.googleapis.com/youtube/v3/playlists?part=id&channelId=' +
                        channelId + '&maxResults=50&key=' + YT_API_KEY;
                    return fetch(playlistUrl).then(function(r) { return r.json(); });
                })
                .then(function(data) {
                    if (!data || !data.items || data.items.length === 0) return;
                    AUTO_PLAYLISTS = data.items.map(function(item) { return item.id; });
                })
                .catch(function() {});
        }
        fetchChannelPlaylists('infinityvideohub');

        // Idle slideshow
        const idlePhotos = [
            'images/TAStation-1.JPG',
            'images/TAStation-2.JPG',
            'images/TAStation-3.JPG',
            'images/TAStation-4.JPG',
            'images/TAStation-5.JPG',
            'images/TAStation-6.JPG',
            'images/TAStation-7.JPG',
            'images/TAStation-8.JPG',
            'images/TAStation-9.JPG',
            'images/TAStation-10.JPG',
            'images/TAStation-11.JPG',
            'images/TAStation-12.JPG',
            'images/TAStation-13.JPG',
            'images/TAStation-14.JPG',
            'images/TAStation-15.JPG',
            'images/TAStation-16.JPG',
            'images/TAStation-17.JPG',
            'images/TAStation-18.JPG',
            'images/TAStation-19.JPG',
            'images/TAStation-20.JPG',
            'images/TAStation-21.JPG',
            'images/TAStation-22.JPG'
        ];
        let idleShuffled = [];
        let idleIndex = 0;
        let idleTimer = null;
        let overlayTimer = null;

        function shuffleIdlePhotos() {
            idleShuffled = idlePhotos.slice();
            for (let i = idleShuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const tmp = idleShuffled[i]; idleShuffled[i] = idleShuffled[j]; idleShuffled[j] = tmp;
            }
            idleIndex = 0;
        }

        // Ticker state
        let tickerMessages = [];
        let tickerIndex = 0;
        let tickerTimer = null;

        // 3. Connect QR Code
        function initConnectQR() {
            const qrImg = document.getElementById('request-qr-img');
            const container = document.getElementById('request-qr-container');
            
            // Generate URL for customer interface
            let customerUrl = window.location.href.split('?')[0].split('#')[0];
            if (customerUrl.endsWith('index.html')) {
                customerUrl = customerUrl.replace('index.html', 'customer.html');
            } else if (customerUrl.endsWith('/')) {
                customerUrl += 'customer.html';
            } else {
                customerUrl += '/customer.html';
            }
            
            qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(customerUrl);
            
            db.ref('settings/showRequestQR').on('value', function(snap) {
                const show = snap.val() !== false; // Default to true if not set
                container.style.display = show ? 'flex' : 'none';
            });
        }
        initConnectQR();

        // Fun facts mixed into the ticker
        const funFacts = [
            // AUTO-GENERATED-FACTS-START
            "🇹🇭 Fun Fact: Thailand has 35,000+ Buddhist temples. That's more temples than bars!",
            "🇹🇭 Fun Fact: Thai people never step on money—it has the King's face on it!",
            "🇹🇭 Fun Fact: Thailand's official name is so long it takes 30 seconds to say!",
            "🇹🇭 Fun Fact: Thais invented pad thai in the 1930s. It's only 90 years old!",
            "🇹🇭 Fun Fact: You can't insult the Thai King. Seriously, it's actually illegal!",
            "🇹🇭 Fun Fact: Bangkok means 'Village of the Wild Plum.' Sounds way less wild!",
            "🇹🇭 Fun Fact: Thai whiskey (Sang Som) costs $3. Your wallet loves Thailand!",
            "🇹🇭 Fun Fact: Thailand's King has 11 official titles. Talk about a resume!",
            "🇹🇭 Fun Fact: Muay Thai fighters wrap their hands in cloth blessed by monks!",
            "🇹🇭 Fun Fact: Thai people greet with 'Wai'—hands together, no awkward handshakes!",
            "🌺 Fun Fact: Hawaii has its own time zone. You literally time travel here!",
            "🌺 Fun Fact: Hawaii is moving toward Japan at 3 inches per year. Slowly!",
            "🌺 Fun Fact: Surfing was invented in Hawaii. Mahalo, ancient Hawaiians!",
            "🌺 Fun Fact: Hawaii has no native land mammals except one bat species. Chill place!",
            "🌺 Fun Fact: Pineapples aren't native to Hawaii. Plot twist of the century!",
            "🌺 Fun Fact: You can see 13 of Earth's 14 climate zones on Maui. Geography nerd!",
            "🌺 Fun Fact: Hawaii's state fish has a 35-letter Hawaiian name. Good luck ordering!",
            "🌺 Fun Fact: Honolulu means 'Protected Harbor.' Perfect for a chill bar scene!",
            "🌺 Fun Fact: Hawaii outlawed fireworks before the US mainland. Safety first!",
            "🌺 Fun Fact: Mai Tai cocktail was invented in Hawaii in 1944. Cheers to that!"
            // AUTO-GENERATED-FACTS-END
        ];

        function buildTickerMessages(sheetMessages) {
            return sheetMessages.slice();
        }

        let factsShuffled = [];
        let factIndex = 0;
        let factsTimer = null;

        function showFunFact() {
            if (factsShuffled.length === 0) {
                factsShuffled = funFacts.slice();
                for (let i = factsShuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    const t = factsShuffled[i]; factsShuffled[i] = factsShuffled[j]; factsShuffled[j] = t;
                }
                factIndex = 0;
            }
            const el = document.getElementById('facts-text');
            el.classList.remove('ticker-visible');
            el.classList.add('ticker-hidden');
            setTimeout(function() {
                el.innerText = factsShuffled[factIndex];
                factIndex = (factIndex + 1) % factsShuffled.length;
                if (factIndex === 0) factsShuffled = [];
                el.classList.remove('ticker-hidden');
                el.classList.add('ticker-visible');
                setTimeout(function() {
                    el.classList.remove('ticker-visible');
                    el.classList.add('ticker-hidden');
                }, 15000);
            }, 800);
            factsTimer = setTimeout(showFunFact, 60000);
        }

        // 3. YOUTUBE SETUP
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                playerVars: { autoplay: 1, controls: 1, rel: 0, enablejsapi: 1 },
                events: {
                    onReady: onPlayerReady,
                    onStateChange: onPlayerStateChange,
                    onError: onPlayerError
                }
            });
        }

        function onPlayerReady() {
            playerReady = true;
            if (pendingVideoId) {
                player.loadVideoById(pendingVideoId);
                pendingVideoId = null;
            }
        }

        function onPlayerError(event) {
            // 101/150 = embedding disabled, 100 = not found
            console.warn('Player error:', event.data, '— skipping to next');
            playNext();
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                reportNowPlaying();
            }
            if (event.data === YT.PlayerState.ENDED) {
                playNext();
            }
            db.ref('settings/playerState').set(event.data);
        }

        function reportNowPlaying() {
            if (!player || !player.getVideoData) return;
            const data = player.getVideoData();
            if (data.video_id) {
                db.ref('settings/nowPlaying').set({
                    videoId: data.video_id,
                    title: data.title || '',
                    author: data.author || ''
                });
            }
        }

        function startAutoPlaylist() {
            stopIdle();
            const pick = AUTO_PLAYLISTS[Math.floor(Math.random() * AUTO_PLAYLISTS.length)];
            player.loadPlaylist({ list: pick, listType: 'playlist' });
        }

        function playNext() {
            db.ref('settings/queue').once('value', function(snap) {
                const queue = snap.val() || [];
                if (queue.length > 0) {
                    const next = queue[0];
                    const remaining = queue.slice(1);
                    db.ref('settings/queue').set(remaining);
                    player.loadVideoById(next.id);
                } else if (autoMode) {
                    startAutoPlaylist();
                } else {
                    startIdle();
                }
            });
        }

        function startIdle() {
            clearTimeout(idleTimer);
            idleTimer = null;
            const screen = document.getElementById('idle-screen');
            screen.classList.add('active');
            showAd(true);
            db.ref('settings/nowPlaying').set(null);
            shuffleIdlePhotos();
            showIdleItem();
            animateOverlay();
        }

        function stopIdle() {
            const screen = document.getElementById('idle-screen');
            screen.classList.remove('active');
            clearTimeout(idleTimer);
            idleTimer = null;
            const vid = document.getElementById('idle-video');
            vid.onended = null;
            vid.pause();
            vid.src = '';
            clearTimeout(overlayTimer);
            overlayTimer = null;
            document.getElementById('idle-overlay').style.opacity = '0';
        }

        function animateOverlay() {
            const screen = document.getElementById('idle-screen');
            if (!screen.classList.contains('active')) return;
            const overlay = document.getElementById('idle-overlay');

            // Give browser 150ms to render idle screen before reading layout
            overlayTimer = setTimeout(function() {
                if (!document.getElementById('idle-screen').classList.contains('active')) return;

                const screenW = screen.offsetWidth || Math.round(window.innerWidth * 0.7);
                const screenH = screen.offsetHeight || window.innerHeight;
                const overlayW = overlay.offsetWidth || 350;
                const overlayH = overlay.offsetHeight || 130;

                const maxX = Math.max(screenW - overlayW - 40, 20);
                const maxY = Math.max(screenH - overlayH - 80, 20);

                // Position while invisible
                overlay.style.left = (Math.floor(Math.random() * maxX) + 20) + 'px';
                overlay.style.top  = (Math.floor(Math.random() * maxY) + 20) + 'px';

                // Force reflow so position is committed before opacity transition starts
                overlay.getBoundingClientRect();

                // Fade in
                overlay.style.opacity = '1';

                // Hold 5s, fade out, then repeat
                overlayTimer = setTimeout(function() {
                    overlay.style.opacity = '0';
                    overlayTimer = setTimeout(animateOverlay, 1400);
                }, 5000);
            }, 150);
        }

        function showIdleItem() {
            const src = idleShuffled[idleIndex];
            const isVideo = /\.mp4$/i.test(src);
            const photo = document.getElementById('idle-photo');
            const vid = document.getElementById('idle-video');

            if (isVideo) {
                photo.style.display = 'none';
                photo.classList.remove('fading');
                vid.style.display = 'block';
                vid.classList.remove('fading');
                vid.src = src;
                vid.load();
                vid.play();
                vid.onended = function() {
                    clearTimeout(idleTimer);
                    advanceIdleItem();
                };
                idleTimer = setTimeout(advanceIdleItem, 120000); // 2 min max fallback
            } else {
                vid.style.display = 'none';
                vid.classList.remove('fading');
                vid.onended = null;
                vid.pause();
                photo.style.display = 'block';
                photo.classList.remove('fading');
                photo.src = src;
                idleTimer = setTimeout(advanceIdleItem, 8000);
            }
        }

        function advanceIdleItem() {
            clearTimeout(idleTimer);
            idleTimer = null;
            const photo = document.getElementById('idle-photo');
            const vid = document.getElementById('idle-video');
            photo.classList.add('fading');
            vid.classList.add('fading');
            setTimeout(function() {
                idleIndex++;
                if (idleIndex >= idleShuffled.length) shuffleIdlePhotos();
                showIdleItem();
            }, 1500);
        }

        function showTickerMessage() {
            const el = document.getElementById('ticker-text');
            if (tickerMessages.length === 0) return;
            // Fade out current message
            el.classList.remove('ticker-visible');
            el.classList.add('ticker-hidden');
            setTimeout(function() {
                // Swap text and fade in
                el.innerText = tickerMessages[tickerIndex];
                tickerIndex = (tickerIndex + 1) % tickerMessages.length;
                el.classList.remove('ticker-hidden');
                el.classList.add('ticker-visible');
                // Fade out after 15 seconds
                setTimeout(function() {
                    el.classList.remove('ticker-visible');
                    el.classList.add('ticker-hidden');
                }, 15000);
            }, 800);
            // Show next message after 60 seconds
            tickerTimer = setTimeout(showTickerMessage, 60000);
        }

        // Converts Google Drive share links to a directly embeddable image URL
        function normalizeFlyerUrl(url) {
            url = url.trim();
            const match = url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);
            if (match) {
                return 'https://lh3.googleusercontent.com/d/' + match[1];
            }
            return url;
        }

        function updateAdsUI(adRows) {
            if (!adRows || adRows.length < 1) return;
            const title = adRows[0] && adRows[0][0];
            const desc = adRows[1] && adRows[1][0];
            const flyer = adRows[2] && adRows[2][0];

            document.getElementById('ad-title').innerText = title || "T.A. Station";
            document.getElementById('ad-desc').innerText = desc || "";
            if (flyer && flyer.includes('http')) {
                document.getElementById('ad-flyer').src = normalizeFlyerUrl(flyer);
            }
        }

        // 4. ASYNC CONTENT SYNC
        async function syncContent() {
            // 1. Sync Ads (with Caching)
            try {
                const adRes = await fetch(URL_ADS);
                if (!adRes.ok) throw new Error('Ads fetch failed');
                const adText = await adRes.text();
                const adResults = Papa.parse(adText, { skipEmptyLines: true });
                const adRows = adResults.data;

                updateAdsUI(adRows);
                localStorage.setItem('cachedAds', JSON.stringify(adRows));
            } catch (e) {
                console.warn("Ads Sync Failed, loading from cache:", e);
                const cached = localStorage.getItem('cachedAds');
                if (cached) {
                    updateAdsUI(JSON.parse(cached));
                }
            }

            // 2. Sync Menu & Ticker
            try {
                // Sync Menu
                const menuRes = await fetch(URL_MENU);
                const menuText = await menuRes.text();
                const menuResults = Papa.parse(menuText, { skipEmptyLines: true });
                const menuRows = menuResults.data;

                let menuHtml = "<h3>DRINKS & PUPUS</h3>";
                menuRows.forEach(row => {
                    if(row[0] && row[0] !== "Item Name") {
                        menuHtml += `<div class="menu-item"><span>${row[0]}</span><span>${row[1] || ''}</span></div>`;
                    }
                });
                document.getElementById('menu-content').innerHTML = menuHtml;

                // Sync Ticker
                const tickRes = await fetch(URL_TICKER);
                const tickText = await tickRes.text();
                const tickResults = Papa.parse(tickText, { skipEmptyLines: true });
                const tickRows = tickResults.data.flat().map(r => r.trim()).filter(r => r.length > 0 && r !== "Message");
                
                tickerMessages = buildTickerMessages(tickRows);
                if (!tickerTimer && tickerMessages.length > 0) {
                    showTickerMessage();
                }

            } catch (e) {
                console.error("Menu/Ticker Sync Failed:", e);
            }
        }

        // 5. FIREBASE LISTENERS
        db.ref('settings/currentVideoId').on('value', function(snap) {
            const vid = snap.val();
            if (!vid) return;
            stopIdle();
            if (playerReady) {
                player.loadVideoById(vid);
            } else {
                pendingVideoId = vid;
            }
        });

        db.ref('settings/playerCommand').on('value', function(snap) {
            const cmd = snap.val();
            if (!cmd || !player) return;
            switch (cmd.action) {
                case 'pause': player.pauseVideo(); break;
                case 'play': player.playVideo(); break;
                case 'next': playNext(); break;
                case 'prev': player.seekTo(0); player.playVideo(); break;
                case 'volume': player.setVolume(cmd.value); break;
                case 'slideshow': player.stopVideo(); startIdle(); break;
                case 'previewLastCall': previewLastCall(); break;
                case 'previewClosed': previewClosed(); break;
                case 'resetLastCall': resetLastCall(); break;
            }
            db.ref('settings/playerCommand').set(null);
        });

        db.ref('settings/autoMode').on('value', function(snap) {
            autoMode = !!snap.val();
            if (autoMode) playNext();
        });

        db.ref('settings/partyMode').on('value', function(snap) {
            isPartyMode = !!snap.val();
            if (isPartyMode) document.body.classList.add('party-mode');
            else document.body.classList.remove('party-mode');
        });

        db.ref('settings/remoteRefresh').on('value', function(snap) {
            if (snap.val()) {
                db.ref('settings/remoteRefresh').set(null);
                location.reload();
            }
        });

        // Karaoke Lock — hides ads when customers are singing
        db.ref('settings/karaokeLock').on('value', function(snap) {
            isLocked = !!snap.val();
            const indicator = document.getElementById('status-indicator');
            if (isLocked) {
                indicator.style.display = 'block';
                hideAd();
            } else {
                indicator.style.display = 'none';
            }
        });

        // Force Ad — show flyer immediately for 25 seconds
        db.ref('settings/forceAd').on('value', function(snap) {
            if (snap.val() && !isLocked) {
                showAd(true);
            }
        });

        function showAd(forceFlyer) {
            const sidebar = document.getElementById('ad-sidebar');
            document.getElementById('app-container').classList.add('ad-active');
            if (forceFlyer || !adCycleShowMenu) {
                sidebar.classList.add('show-flyer');
                sidebar.classList.remove('show-menu');
            } else {
                sidebar.classList.add('show-menu');
                sidebar.classList.remove('show-flyer');
            }
            if (!forceFlyer) {
                adCycleShowMenu = !adCycleShowMenu;
            }
            clearTimeout(window._adTimer);
            window._adTimer = setTimeout(hideAd, 25000);
        }

        function hideAd() {
            const sidebar = document.getElementById('ad-sidebar');
            document.getElementById('app-container').classList.remove('ad-active');
            sidebar.classList.remove('show-flyer');
            sidebar.classList.remove('show-menu');
        }

        // 6. AUTO-AD ROTATION — show ads every 3 minutes for 25 seconds
        setInterval(function() {
            if (!isLocked) {
                showAd();
            }
        }, 180000);

        // 7. START SYNC
        const cachedAds = localStorage.getItem('cachedAds');
        if (cachedAds) updateAdsUI(JSON.parse(cachedAds));
        
        syncContent();
        setInterval(syncContent, 60000);
        showFunFact();

        // 8. CLOCK — updates every second, Hawaii time
        function updateClock() {
            const el = document.getElementById('clock-display');
            el.innerText = new Date().toLocaleTimeString('en-US', {
                timeZone: 'Pacific/Honolulu',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
        }
        updateClock();
        setInterval(updateClock, 1000);

        // 9. WEATHER — Honolulu, HI via Open-Meteo (free, no API key)
        function getWeatherIcon(code) {
            if (code === 0) return '☀️';
            if (code <= 2) return '🌤️';
            if (code === 3) return '☁️';
            if (code <= 48) return '🌫️';
            if (code <= 67) return '🌧️';
            if (code <= 82) return '🌦️';
            return '⛈️';
        }

        function syncWeather() {
            fetch('https://api.open-meteo.com/v1/forecast?latitude=21.3069&longitude=-157.8583&current_weather=true&temperature_unit=fahrenheit')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    const w = data.current_weather;
                    document.getElementById('weather-display').innerText =
                        getWeatherIcon(w.weathercode) + ' ' + Math.round(w.temperature) + '°F';
                })
                .catch(function(e) { console.warn('Weather fetch failed:', e); });
        }
        syncWeather();
        setInterval(syncWeather, 600000); // every 10 minutes

        function showLastCallScreen() {
            if (player && playerReady) player.stopVideo();
            document.getElementById('player').style.visibility = 'hidden';
            startIdle();
        }

        function hideLastCallScreen() {
            document.getElementById('lastcall-screen').classList.remove('active');
            document.getElementById('player').style.visibility = 'visible';
            stopIdle();
            lcLastCallActive = false;
            lcClosedActive = false;
        }

        function previewLastCall() {
            lcIsPreview = true;
            showLastCallScreen();
            document.getElementById('phase-lastcall').classList.add('active');
            document.getElementById('phase-closed').classList.remove('active');
            document.getElementById('lc-countdown').textContent = '15:00';
            document.getElementById('lastcall-screen').classList.add('active');
            lcLastCallActive = true;
            lcClosedActive = false;
        }

        function previewClosed() {
            lcIsPreview = true;
            showLastCallScreen();
            const msg = goodbyeMessages[Math.floor(Math.random() * goodbyeMessages.length)];
            document.getElementById('lc-goodbye').textContent = msg;
            document.getElementById('phase-lastcall').classList.remove('active');
            document.getElementById('phase-closed').classList.add('active');
            document.getElementById('lastcall-screen').classList.add('active');
            lcClosedActive = true;
            lcLastCallActive = false;
        }

        function resetLastCall() {
            lcIsPreview = false;
            hideLastCallScreen();
        }

        // 10. LAST CALL / CLOSED SEQUENCE
        const goodbyeMessages = [
            "Thank you for an amazing night! Drive safe and aloha! 🤙",
            "Khob khun mak kha! You were wonderful guests — come back soon! 🇹🇭",
            "Mahalo for making tonight unforgettable! Safe travels home! 🌺",
            "You were the best guests ever! Aloha until next time! 🌴",
            "Sawadee kha! Thank you for spending your night with us! 🙏",
            "Thanks for partying with us tonight! See you next time! 🎉",
            "Aloha! You were amazing tonight — sleep well! 🌙",
            "Mahalo nui loa! We'll miss you already — come back soon! 💛",
            "What a night! Thank you for being here — safe ride home! 🚗",
            "Khob khun! Tonight was wonderful, thanks to each and every one of you! 🇹🇭🌺"
        ];

        let lcLastCallActive = false;
        let lcClosedActive = false;
        let lcIsPreview = false;

        function checkLastCallTime() {
            const now = new Date();
            const hawaii = new Date(now.toLocaleString('en-US', { timeZone: 'Pacific/Honolulu' }));
            const h = hawaii.getHours();
            const m = hawaii.getMinutes();
            const s = hawaii.getSeconds();
            const totalSec = h * 3600 + m * 60 + s;

            const LAST_CALL = 1 * 3600 + 45 * 60; // 1:45 AM
            const CLOSING   = 2 * 3600;            // 2:00 AM
            const RESET     = 3 * 3600;            // 3:00 AM

            const screen = document.getElementById('lastcall-screen');

            if (totalSec >= LAST_CALL && totalSec < CLOSING) {
                // ── Last Call phase ──
                if (!lcLastCallActive) {
                    lcLastCallActive = true;
                    lcClosedActive = false;
                    showLastCallScreen();
                    document.getElementById('phase-lastcall').classList.add('active');
                    document.getElementById('phase-closed').classList.remove('active');
                    screen.classList.add('active');
                }
                const remaining = CLOSING - totalSec;
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                document.getElementById('lc-countdown').textContent =
                    mins + ':' + (secs < 10 ? '0' : '') + secs;

            } else if (totalSec >= CLOSING && totalSec < RESET) {
                // ── Closed phase ──
                if (!lcClosedActive) {
                    lcClosedActive = true;
                    lcLastCallActive = false;
                    showLastCallScreen();
                    const msg = goodbyeMessages[Math.floor(Math.random() * goodbyeMessages.length)];
                    document.getElementById('lc-goodbye').textContent = msg;
                    document.getElementById('phase-lastcall').classList.remove('active');
                    document.getElementById('phase-closed').classList.add('active');
                    screen.classList.add('active');
                }

            } else if ((lcLastCallActive || lcClosedActive) && !lcIsPreview) {
                // ── 3 AM reset ──
                location.reload();
            }
        }

        setInterval(checkLastCallTime, 1000);
        checkLastCallTime();

        // 11. TICKER POSITION
        db.ref('settings/tickerPosition').on('value', function(snap) {
            const pos = snap.val() || 'top';
            document.body.classList.remove('ticker-bottom', 'ticker-left', 'ticker-right');
            if (pos !== 'top') document.body.classList.add('ticker-' + pos);
        });

        // 12. AIRCONSOLE OVERLAY
        db.ref('settings/airConsole').on('value', function(snap) {
            const overlay = document.getElementById('airconsole-overlay');
            const frame = document.getElementById('airconsole-frame');
            if (snap.val()) {
                frame.src = 'https://www.airconsole.com/';
                overlay.classList.add('active');
                if (player && playerReady) player.pauseVideo();
            } else {
                overlay.classList.remove('active');
                frame.src = '';
                if (player && playerReady) player.playVideo();
            }
        });

        function closeAirConsole() {
            db.ref('settings/airConsole').set(false);
        }
    </script>

</body>
</html>
