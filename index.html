<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T.A. Station - Digital Signage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="images/TAStation-1.JPG">
    <meta name="referrer" content="no-referrer-when-downgrade">
</head>
<body>

    <div id="status-indicator">KARAOKE LOCKED</div>

    <!-- Connection Status LED -->
    <div id="conn-status-led" style="position: fixed; bottom: 10px; left: 10px; width: 6px; height: 6px; background: #28a745; border-radius: 50%; box-shadow: 0 0 5px #28a745; z-index: 10001; transition: all 0.5s ease; opacity: 0.6;"></div>

    <div id="app-container">
        <div id="video-section">
            <div id="player"></div>
            <div id="idle-screen">
                <img id="idle-photo" src="images/TAStation-1.JPG" alt="">
                <video id="idle-video" muted playsinline preload="auto"></video>
                <div id="idle-overlay">
                    <div id="idle-logo" class="venue-name-display" style="text-transform: uppercase;">T.A. STATION</div>
                    <div id="idle-tagline">Honolulu, HI</div>
                </div>
            </div>
        </div>

        <div id="ad-sidebar">
            <div class="sidebar-inner">
                <h2 id="ad-title">T.A. Station</h2>
                <p id="ad-desc"></p>
                <img id="ad-flyer" alt="Event Flyer">
                <div class="menu-section" id="menu-content"></div>
                
                <!-- NEW: Up Next Info -->
                <div id="up-next-section" style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,204,0,0.3); display: none;">
                    <h3 style="color: var(--bar-gold); font-size: 0.9rem; margin-bottom: 10px; letter-spacing: 2px;">COMING UP NEXT</h3>
                    <div id="up-next-info" style="display: flex; gap: 15px; align-items: center; margin-bottom: 15px;">
                        <img id="up-next-thumb" src="" style="width: 100px; aspect-ratio: 16/9; border-radius: 8px; object-fit: cover; border: 1px solid #444;">
                        <div style="flex: 1; min-width: 0;">
                            <div id="up-next-title" style="font-weight: 900; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white;"></div>
                            <div id="up-next-author" style="font-size: 0.8rem; opacity: 0.6; color: var(--bar-gold);"></div>
                        </div>
                    </div>
                    <div id="up-next-history" style="font-size: 0.85rem; line-height: 1.4; opacity: 0.9; color: #eee; font-family: sans-serif; font-style: italic;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Last Call / Closed Overlay -->
    <div id="lastcall-screen">
        <div id="lastcall-inner">
            <div id="phase-lastcall" class="lc-phase">
                <div class="lc-bell">🔔</div>
                <div class="lc-title">LAST CALL</div>
                <div class="lc-countdown" id="lc-countdown">15:00</div>
                <div class="lc-sub">Bar closes at 2:00 AM &bull; Get your last orders in!</div>
            </div>
            <div id="phase-closed" class="lc-phase">
                <div class="lc-title">MAHALO!</div>
                <div class="lc-closed-sub">We Are Now Closed</div>
                <div class="lc-goodbye" id="lc-goodbye"></div>
                <div class="lc-sub"><span class="venue-name-display">T.A. Station</span> &bull; Honolulu, HI 🌺</div>
            </div>
        </div>
    </div>

    <!-- AirConsole Overlay -->
    <div id="airconsole-overlay">
        <iframe id="airconsole-frame" src="" allowfullscreen></iframe>
        <button id="airconsole-close" onclick="closeAirConsole()">&#x2715; Back to Signage</button>
    </div>

    <!-- Request Song QR Code -->
    <div id="request-qr-container" style="position: fixed; bottom: 105px; right: 20px; z-index: 2100; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 10px; border: 2px solid var(--bar-gold); text-align: center; width: 75px; display: none; flex-direction: column; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: opacity 0.5s ease;">
        <div style="font-size: 0.6rem; color: var(--bar-gold); font-weight: 900; margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase;">Request a Song</div>
        <div id="qr-wrapper" style="background: white; padding: 3px; border-radius: 5px; line-height: 0;">
            <img id="request-qr-img" src="" style="width: 60px; height: 60px; display: block;" alt="QR Code">
        </div>
        <div style="font-size: 0.55rem; margin-top: 5px; opacity: 0.9; font-weight: bold;">Scan with Phone</div>
    </div>

    <!-- Song Fact Bubble -->
    <div id="fact-bubble">
        <div id="fact-bubble-text"></div>
    </div>

    <div id="ticker-container">
        <div id="version-tag" style="position: absolute; bottom: 2px; right: 5px; font-size: 10px; color: rgba(255,255,255,0.2); z-index: 100;">v1.5.3 (2026-04-18 HST)</div>
        <div id="ticker-row1">
            <div id="weather-display"></div>
            <div class="ticker-wrap">
                <span id="ticker-text"></span>
            </div>
            <div id="clock-display"></div>
        </div>
        <div id="ticker-row2">
            <div class="ticker-wrap">
                <span id="facts-text"></span>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <!-- CONFIGURATION -->
    <script src="config.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('service-worker.js');
            });
        }

        // ── GLOBALS ──
        var player;
        var playerReady = false;
        var pendingVideoId = null;
        var isLocked = false;
        var isPartyMode = false;
        var adCycleShowMenu = false;
        var autoMode = false;
        var tickerMessages = [];
        var tickerIndex = 0;
        var tickerTimer = null;
        var venueId = null;
        var vRef = null;
        var db = null;

        // ── HELPERS ──
        function escHtml(str) {
            var div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        function buildTickerMessages(sheetMessages) {
            if (!sheetMessages) return [];
            return sheetMessages.slice ? sheetMessages.slice() : Object.values(sheetMessages);
        }

        function normalizeFlyerUrl(url) {
            url = (url || "").trim();
            var match = url.match(/drive\.google\.com\/file\/d\/([^\/\?]+)/);
            if (match) return 'https://lh3.googleusercontent.com/d/' + match[1];
            return url;
        }

        // ── LOCAL STORAGE MIRRORING ──
        function saveLocal(key, val) {
            try { localStorage.setItem("tbs_" + venueId + "_" + key, JSON.stringify(val)); } catch(e) {}
        }
        function getLocal(key) {
            try { return JSON.parse(localStorage.getItem("tbs_" + venueId + "_" + key)); } catch(e) { return null; }
        }

        // ── UI UPDATERS ──
        function updateMenuUI(menu) {
            var el = document.getElementById("menu-content");
            if (!el) return;
            if (menu) {
                var menuHtml = "<h3>" + (window._currentVenueName || "T.A. Station").toUpperCase() + " MENU</h3>";
                for (var key in menu) {
                    var item = menu[key];
                    menuHtml += "<div class=\"menu-item\"><span>" + escHtml(item.name) + "</span><span>" + escHtml(item.price || "") + "</span></div>";
                }
                el.innerHTML = menuHtml;
            } else {
                el.innerHTML = "<h3>MENU</h3><div style=\"opacity:0.3;text-align:center;\">Set menu in remote</div>";
            }
        }

        function updateAdUI(ad) {
            var flyerImg = document.getElementById("ad-flyer");
            var titleEl = document.getElementById("ad-title");
            var descEl = document.getElementById("ad-desc");
            if (!flyerImg || !titleEl || !descEl) return;
            if (ad) {
                titleEl.innerText = ad.title || window._currentVenueName || "T.A. Station";
                descEl.innerText = ad.desc || "";
                if (ad.flyer) {
                    flyerImg.src = normalizeFlyerUrl(ad.flyer);
                    flyerImg.style.display = "block";
                    flyerImg.onerror = function() { this.style.display = "none"; };
                } else {
                    flyerImg.style.display = "none";
                }
            }
        }

        function updateVenueNameUI(name) {
            window._currentVenueName = name;
            var displays = document.querySelectorAll(".venue-name-display");
            for (var i = 0; i < displays.length; i++) {
                var el = displays[i];
                el.textContent = name;
                if (el.id === "idle-logo") el.textContent = name.toUpperCase();
            }
            document.title = name + " - Digital Signage";
            var adTitle = document.getElementById("ad-title");
            if (adTitle && !adTitle.dataset.hasCustomText) adTitle.innerText = name;
        }

        function updateTickerPosUI(pos) {
            document.body.classList.remove("ticker-bottom", "ticker-left", "ticker-right");
            if (pos !== "top") document.body.classList.add("ticker-" + pos);
        }

        // ── INITIALIZATION ──
        function initApp() {
            // Venue Logic
            var urlParams = new URLSearchParams(window.location.search);
            venueId = urlParams.get('v');
            if (!venueId) {
                venueId = Math.random().toString(36).substring(2, 6).toUpperCase();
                var newurl = window.location.protocol + "//" + window.location.host + window.location.pathname + "?v=" + venueId;
                window.history.pushState({path:newurl},"",newurl);
            }

            // Firebase Start
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            vRef = db.ref("venues/" + venueId);

            // Load from LS
            var cachedName = getLocal("venueName") || "T.A. Station";
            updateVenueNameUI(cachedName);
            updateMenuUI(getLocal("menu"));
            var cachedTicker = getLocal("ticker");
            if (cachedTicker) tickerMessages = buildTickerMessages(cachedTicker);
            updateAdUI(getLocal("adConfig"));
            updateTickerPosUI(getLocal("tickerPosition") || "top");

            // Auth
            firebase.auth().onAuthStateChanged(function(user) {
                if (user) initFirebaseListeners();
                else firebase.auth().signInAnonymously();
            });

            // Connection Dot
            db.ref(".info/connected").on("value", function(snap) {
                var led = document.getElementById("conn-status-led");
                if (!led) return;
                if (snap.val() === true) {
                    led.style.background = "#28a745";
                    led.style.boxShadow = "0 0 8px #28a745";
                    led.style.opacity = "0.6";
                } else {
                    led.style.background = "#ff4444";
                    led.style.boxShadow = "0 0 10px #ff4444";
                    led.style.opacity = "1";
                }
            });

            // Start Timers
            updateClock();
            setInterval(updateClock, 1000);
            syncWeather();
            setInterval(syncWeather, 600000);
            showFunFact();
            if (tickerMessages.length > 0) showTickerMessage();
            
            // Auto Ad Interval
            setInterval(function() { if (!isLocked) showAd(); }, 180000);
        }

        // ── FIREBASE LISTENERS ──
        function initFirebaseListeners() {
            initConnectQR();
            vRef.child("settings/menu").on("value", function(snap) { saveLocal("menu", snap.val()); updateMenuUI(snap.val()); });
            vRef.child("settings/adConfig").on("value", function(snap) { saveLocal("adConfig", snap.val()); updateAdUI(snap.val()); });
            vRef.child("settings/ticker").on("value", function(snap) { 
                var msgs = snap.val();
                saveLocal("ticker", msgs);
                tickerMessages = buildTickerMessages(msgs);
                if (!tickerTimer && tickerMessages.length > 0) showTickerMessage();
            });
            vRef.child("settings/currentVideoId").on("value", function(snap) {
                var vid = snap.val();
                if (!vid) return;
                if (typeof vid === "object" && vid.id) vid = vid.id;
                if (typeof vid !== "string") return;
                stopIdle();
                if (playerReady && player && player.loadVideoById) player.loadVideoById(vid);
                else pendingVideoId = vid;
            });
            vRef.child("settings/queue").on("value", function(snap) {
                var queue = snap.val() || [];
                saveLocal("queue", queue);
                if (queue.length > 0 && document.getElementById("idle-screen").classList.contains("active")) playNext();
            });
            vRef.child("settings/playerCommand").on("value", function(snap) {
                var cmd = snap.val();
                if (!cmd || !player) return;
                switch (cmd.action) {
                    case "pause": player.pauseVideo(); break;
                    case "play": player.playVideo(); break;
                    case "next": playNext(); break;
                    case "prev": player.seekTo(0); player.playVideo(); break;
                    case "volume": player.setVolume(cmd.value); break;
                    case "slideshow": player.stopVideo(); startIdle(); break;
                    case "fixDisplay": stopIdle(); if (player && player.getPlayerState() !== 1) playNext(); break;
                }
                vRef.child("settings/playerCommand").set(null);
            });
            vRef.child("settings/autoMode").on("value", function(snap) { autoMode = !!snap.val(); if (autoMode) playNext(); });
            vRef.child("settings/partyMode").on("value", function(snap) { 
                isPartyMode = !!snap.val();
                document.body.classList.toggle("party-mode", isPartyMode);
            });
            vRef.child("settings/karaokeLock").on("value", function(snap) {
                isLocked = !!snap.val();
                document.getElementById("status-indicator").style.display = isLocked ? "block" : "none";
                if (isLocked) hideAd();
            });
            vRef.child("settings/venueName").on("value", function(snap) { saveLocal("venueName", snap.val()); updateVenueNameUI(snap.val() || "T.A. Station"); });
            vRef.child("settings/tickerPosition").on("value", function(snap) { saveLocal("tickerPosition", snap.val()); updateTickerPosUI(snap.val() || "top"); });
        }

        // ── YOUTUBE ──
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                playerVars: { autoplay: 1, controls: 1, rel: 0, enablejsapi: 1, iv_load_policy: 3 },
                events: {
                    onReady: function() {
                        playerReady = true;
                        if (pendingVideoId) { player.loadVideoById(pendingVideoId); pendingVideoId = null; }
                    },
                    onStateChange: function(event) {
                        if (event.data === YT.PlayerState.PLAYING) {
                            reportNowPlaying();
                            showSongFact();
                        }
                        if (event.data === YT.PlayerState.ENDED) {
                            playNext();
                            hideSongFact();
                        }
                        vRef.child('settings/playerState').set(event.data);
                    },
                    onError: function() { setTimeout(playNext, 2000); }
                }
            });
        }

        function playNext() {
            vRef.child('settings/queue').once('value', function(snap) {
                var queue = snap.val() || [];
                if (queue.length > 0) {
                    var next = queue[0];
                    vRef.child('settings/queue').set(queue.slice(1));
                    stopIdle();
                    if (player && player.loadVideoById) player.loadVideoById(next.id);
                    else pendingVideoId = next.id;
                } else {
                    startIdle();
                }
            });
        }

        function reportNowPlaying() {
            if (!player || !player.getVideoData) return;
            var data = player.getVideoData();
            if (data.video_id) vRef.child('settings/nowPlaying').set({ videoId: data.video_id, title: data.title || '', author: data.author || '' });
        }

        // ── FEATURES ──
        function updateClock() {
            var el = document.getElementById("clock-display");
            if (el) el.innerText = new Date().toLocaleTimeString("en-US", { timeZone: "Pacific/Honolulu", hour: "numeric", minute: "2-digit", hour12: true });
        }

        function syncWeather() {
            fetch("https://api.open-meteo.com/v1/forecast?latitude=21.3069&longitude=-157.8583&current_weather=true&temperature_unit=fahrenheit")
                .then(r => r.json()).then(data => {
                    var el = document.getElementById("weather-display");
                    if (el && data.current_weather) {
                        var icons = { 0: "☀️", 1: "🌤️", 2: "🌤️", 3: "☁️" };
                        var icon = icons[data.current_weather.weathercode] || "🌧️";
                        el.innerText = icon + " " + Math.round(data.current_weather.temperature) + "°F";
                    }
                }).catch(() => {});
        }

        function showTickerMessage() {
            var el = document.getElementById('ticker-text');
            if (!el || tickerMessages.length === 0) return;
            el.classList.remove('ticker-visible'); el.classList.add('ticker-hidden');
            setTimeout(function() {
                el.innerText = tickerMessages[tickerIndex];
                tickerIndex = (tickerIndex + 1) % tickerMessages.length;
                el.classList.remove('ticker-hidden'); el.classList.add('ticker-visible');
                setTimeout(function() { el.classList.remove('ticker-visible'); el.classList.add('ticker-hidden'); }, 15000);
            }, 800);
            tickerTimer = setTimeout(showTickerMessage, 60000);
        }

        // ── IDLE / SLIDESHOW ──
        var idlePhotos = ['images/TAStation-1.JPG','images/TAStation-2.JPG','images/TAStation-3.JPG','images/TAStation-4.JPG','images/TAStation-5.JPG','images/TAStation-6.JPG','images/TAStation-7.JPG','images/TAStation-8.JPG','images/TAStation-9.JPG','images/TAStation-10.JPG'];
        var idleIndex = 0;
        var idleTimer = null;

        function startIdle() {
            var screen = document.getElementById('idle-screen');
            screen.classList.add('active');
            showAd(true);
            vRef.child('settings/nowPlaying').set(null);
            showIdleItem();
        }

        function stopIdle() {
            document.getElementById('idle-screen').classList.remove('active');
            clearTimeout(idleTimer);
        }

        function showIdleItem() {
            var photo = document.getElementById('idle-photo');
            photo.src = idlePhotos[idleIndex];
            idleIndex = (idleIndex + 1) % idlePhotos.length;
            idleTimer = setTimeout(showIdleItem, 8000);
        }

        function showAd(forceFlyer) {
            var sidebar = document.getElementById("ad-sidebar");
            var container = document.getElementById("app-container");
            container.classList.add("ad-active");
            sidebar.className = (forceFlyer || !adCycleShowMenu) ? "show-flyer" : "show-menu";
            if (!forceFlyer) adCycleShowMenu = !adCycleShowMenu;
            setTimeout(hideAd, 25000);
        }

        function hideAd() {
            document.getElementById("ad-sidebar").className = "";
            document.getElementById("app-container").classList.remove("ad-active");
        }

        // Wikipedia Song Facts (Stub for now)
        function showSongFact() {}
        function hideSongFact() {}
        function showFunFact() {}
        function initConnectQR() {}

        // ── BOOT ──
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initApp);
        else initApp();

    </script>
</body>
</html>
