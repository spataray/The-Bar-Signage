name: Weekly Fun Facts Update

on:
  schedule:
    - cron: '0 22 * * 2'  # Tuesday noon HST (UTC-10, no daylight saving)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

jobs:
  update-facts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Anthropic SDK
        run: pip install anthropic -q

      - name: Generate new fun facts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 update_facts.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "✨ Fresh fun facts for the week (auto-generated)"
          git push
