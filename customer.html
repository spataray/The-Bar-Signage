<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Requests</title>
    <link rel="manifest" href="manifest-customer.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="images/TAStation-1.JPG">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bar-gold: #ffcc00;
            --bar-red: #ff4444;
            --bar-green: #28a745;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Slim Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: var(--card-bg);
            border-bottom: 1px solid #333;
            flex-shrink: 0;
            height: 50px;
            box-sizing: border-box;
        }

        .venue-name-display { margin: 0; font-size: 0.9rem; color: var(--bar-gold); text-transform: uppercase; letter-spacing: 1px; font-weight: 900; }
        .cc-wrap { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: bold; opacity: 0.8; }

        /* Dashboard Grid - Swapped for Desktop (NP+Queue Left, Search Right) */
        .main-layout {
            flex: 1;
            display: grid;
            grid-template-columns: 0.8fr 1.2fr;
            gap: 10px;
            padding: 10px;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Full Height Columns */
        .left-col, .right-col {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }

        .card {
            background: var(--card-bg);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card h3 { margin: 0 0 10px 0; font-size: 0.85rem; color: var(--bar-gold); text-transform: uppercase; letter-spacing: 1px; }

        /* Search Area */
        .search-card { flex: 1; }
        .search-box { display: flex; gap: 8px; margin-bottom: 12px; flex-shrink: 0; }
        input[type="search"] { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-size: 0.95rem; outline: none; }
        .btn-search { 
            padding: 10px 20px; 
            background: var(--bar-gold); 
            color: black; 
            border: none; 
            border-radius: 8px; 
            font-weight: 900; 
            cursor: pointer; 
            min-width: 60px;
            transition: transform 0.1s, background-color 0.1s;
        }
        .btn-search:active {
            transform: scale(0.95);
            background-color: #e6b800;
        }

        /* Preview Area */
        #now-playing-card {
            flex: 0 0 auto;
            justify-content: center;
            background: linear-gradient(180deg, #1e1e1e 0%, #000 100%);
            margin-bottom: 10px;
            padding: 15px;
        }

        #np-container { display: flex; flex-direction: column; gap: 12px; align-items: center; }
        #np-thumb { width: 100%; max-width: 500px; aspect-ratio: 16/9; object-fit: cover; border-radius: 10px; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333; }
        .np-info-wrap { text-align: center; width: 100%; }
        #np-title { font-size: 1.2rem; font-weight: 900; color: var(--bar-gold); margin-bottom: 4px; line-height: 1.2; }
        #np-author { font-size: 0.85rem; opacity: 0.6; }

        /* Queue Area */
        .queue-card { flex: 1; min-height: 0; }

        /* Scrollable Content */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-right: 2px;
        }

        /* Results & Queue Item Styling */
        .result-item, .queue-item { display: flex; gap: 10px; padding: 10px; background: #252525; border-radius: 8px; align-items: center; margin-bottom: 8px; position: relative; }
        .result-thumb { width: 90px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; }
        .result-info { flex: 1; min-width: 0; padding-right: 35px; }
        .result-title { font-size: 0.8rem; font-weight: 600; line-height: 1.3; color: #eee; }
        .result-channel { font-size: 0.7rem; opacity: 0.5; }

        .btn-add { position: absolute; right: 10px; background: var(--bar-gold); color: black; border: none; border-radius: 50%; width: 34px; height: 34px; font-size: 1.4rem; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .queue-item { border-left: 4px solid var(--bar-gold); }
        .queue-item:first-child { background: #2a2a2a; border-left: 4px solid var(--bar-green); }
        .queue-thumb { width: 70px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; cursor: grab; }
        .queue-title { font-size: 0.75rem; font-weight: 500; color: #fff; flex: 1; min-width: 0; }
        .btn-q-play { background: var(--bar-green); color: white; border: none; border-radius: 4px; font-size: 0.6rem; padding: 4px 6px; font-weight: bold; cursor: pointer; }
        .queue-remove { background: none; border: none; color: #ff4444; font-size: 1.2rem; cursor: pointer; padding: 0 5px; }

        /* Toggles */
        .toggle-switch { position: relative; width: 40px; height: 22px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #444; border-radius: 20px; cursor: pointer; transition: 0.2s; }
        .toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.2s; }
        input:checked + .toggle-slider { background: var(--bar-green); }
        input:checked + .toggle-slider::before { transform: translateX(18px); }

        #offline-banner { display: none; background: var(--bar-red); color: white; text-align: center; padding: 5px; font-size: 0.7rem; font-weight: bold; }
        #status-msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: var(--bar-gold); padding: 10px 20px; border-radius: 30px; border: 1px solid var(--bar-gold); z-index: 1000; display: none; pointer-events: none; }

        /* Updated Mobile Portrait Layout: NP (Top), Queue (Mid), Search (Bottom) */
        @media (max-width: 600px) {
            .main-layout { 
                grid-template-columns: 1fr; 
                display: flex; 
                flex-direction: column; 
                gap: 8px; 
                padding: 8px;
                height: calc(100vh - 50px);
            }
            
            .right-col { order: 1; flex: 1; }  /* NP + Queue Container */
            .left-col { order: 2; flex: 1.2; } /* Search Bottom */
            
            #now-playing-card { order: -1; padding: 8px; margin-bottom: 8px; } /* NP within Right-col stays top */
            .queue-card { order: 1; } /* Queue below NP */

            #np-container {
                flex-direction: row;
                gap: 10px;
                align-items: center;
            }
            
            #np-thumb {
                width: 60px;
                max-width: 60px;
                aspect-ratio: 16/9;
            }
            
            .np-info-wrap {
                text-align: left;
            }
            
            #np-title {
                font-size: 0.8rem;
            }
            #np-author { font-size: 0.7rem; }

            .left-col, .right-col { 
                height: auto; 
                overflow: visible;
                min-height: 0;
            }
            
            .search-card { height: 100%; min-height: 200px; }
            .queue-card { height: 100%; min-height: 150px; }

            .scroll-content {
                max-height: 250px;
            }
        }
    </style>
</head>
<body>

    <div id="offline-banner">CONNECTION LOST - RECONNECTING...</div>

    <div class="top-bar">
        <div style="display:flex; flex-direction:column;">
            <h1 class="venue-name-display" style="margin-bottom:2px;">THE STATION</h1>
            <div style="font-size:0.6rem; opacity:0.7; font-weight:bold; display:flex; align-items:center; gap:5px;">
                CONNECTED: <span id="current-code-display" style="color:var(--bar-gold);">----</span>
                <a href="#" onclick="switchVenue(); return false;" style="color:white; text-decoration:underline; font-size:0.55rem; opacity:0.5;">[SWITCH]</a>
            </div>
        </div>
        <div class="cc-wrap" style="flex-direction: column; align-items: flex-end; gap: 2px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span>SUBTITLES (CC)</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle-cc" onchange="setCaptions(this.checked)">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div style="font-size: 8px; opacity: 0.3; font-family: monospace; letter-spacing: 0;">v1.7.3 (2026-04-26 10:24 HST)</div>
        </div>
    </div>

    <div class="main-layout">
        <!-- LEFT ON DESKTOP (Now Playing & Queue) -->
        <div class="right-col">
            <!-- NOW PLAYING AT TOP -->
            <div class="card" id="now-playing-card">
                <h3>Now Playing</h3>
                <div id="np-container">
                    <img id="np-thumb" src="images/TAStation-1.JPG" alt="">
                    <div class="np-info-wrap">
                        <div id="np-title">Nothing playing</div>
                        <div id="np-author">--</div>
                    </div>
                </div>
            </div>

            <!-- QUEUE IN MIDDLE -->
            <div class="card queue-card">
                <h3>Queue <span id="queue-count" style="opacity:0.5; font-size:0.7rem;"></span></h3>
                <div class="scroll-content" id="queue-list">
                    <div style="text-align:center; padding:20px; opacity:0.2;">Loading queue...</div>
                </div>
            </div>
        </div>

        <!-- RIGHT ON DESKTOP (Search) -->
        <div class="left-col">
            <div class="card search-card" style="display:flex; flex-direction:column;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h3 style="margin:0;">🔍 FIND MUSIC</h3>
                    <div style="display:flex; gap:5px;">
                        <button id="tab-btn-search" onclick="switchDiscovery('search')" style="background:var(--bar-gold); color:black; border:none; padding:4px 10px; border-radius:4px; font-size:0.7rem; font-weight:bold; cursor:pointer;">SEARCH</button>
                        <button id="tab-btn-featured" onclick="switchDiscovery('featured')" style="background:#333; color:white; border:none; padding:4px 10px; border-radius:4px; font-size:0.7rem; font-weight:bold; cursor:pointer;">FEATURED</button>
                    </div>
                </div>

                <!-- SEARCH TAB -->
                <div id="pane-search">
                    <form id="search-form" class="search-box" action="javascript:void(0);" onsubmit="doSearch(); return false;">
                        <input type="search" id="search-input" placeholder="Search songs..." autocomplete="off" oninput="updateSuggestions(this.value)">
                        <select id="search-type" style="background: #333; color: white; border: 1px solid #444; border-radius: 8px; padding: 0 5px; font-size: 0.8rem;">
                            <option value="video">Songs</option>
                            <option value="playlist">Playlists</option>
                        </select>
                        <datalist id="search-suggestions"></datalist>
                        <button type="submit" class="btn-search" id="search-btn">GO</button>
                    </form>
                    <div id="search-error" style="color:var(--bar-red); font-size:0.7rem; margin-bottom:10px; display:none;"></div>
                    <div class="scroll-content" id="search-results">
                        <div style="text-align:center; padding:40px; opacity:0.2;">Search for a song to begin!</div>
                    </div>
                </div>

                <!-- FEATURED TAB -->
                <div id="pane-featured" style="display:none; flex:1; overflow:hidden; flex-direction:column;">
                    <div class="scroll-content" id="featured-list" style="display:flex; flex-direction:column; gap:8px;">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="status-msg"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <!-- CONFIGURATION -->
    <script src="config.js"></script>

    <script>
        // 1. Core Logic
        function getVenueId() {
            var urlParams = new URLSearchParams(window.location.search);
            var v = urlParams.get('v');
            if (v && v !== 'DEFAULT' && v.trim().length === 4) {
                return v.toUpperCase().trim();
            }
            var promptVal = prompt("Enter 4-character Connect Code (shown on TV):");
            if (promptVal) {
                var code = promptVal.toUpperCase().trim();
                if (code.length === 4) {
                    window.location.search = '?v=' + code;
                } else {
                    alert("Invalid Connect Code.");
                }
            }
            return 'DEFAULT';
        }

        function switchVenue() {
            var promptVal = prompt("Enter new 4-character Connect Code:");
            if (promptVal) {
                var code = promptVal.toUpperCase().trim();
                if (code.length === 4) {
                    window.location.search = '?v=' + code;
                } else {
                    alert("Invalid code.");
                }
            }
        }

        // 2. Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        var venueId = getVenueId();
        var vRef = db.ref('venues/' + venueId);
        if (typeof YT_API_KEY === 'undefined') { window.YT_API_KEY = firebaseConfig.apiKey; }

        // AUTH & INITIALIZATION
        firebase.auth().onAuthStateChanged(function(user) {
            if (user) {
                console.log("Authenticated as:", user.uid);
                initFirebaseListeners();
            } else {
                firebase.auth().signInAnonymously().catch(function(error) {
                    console.error("Firebase Anonymous Auth Error:", error.code, error.message);
                });
            }
        });

        // UI & Event Listeners
        document.addEventListener('DOMContentLoaded', function() {
            var displayEl = document.getElementById('current-code-display');
            if (displayEl) displayEl.textContent = venueId;

            // Search input Enter key
            var searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        doSearch();
                    }
                });
            }

            // Search button click
            var searchBtn = document.getElementById('search-btn');
            if (searchBtn) {
                searchBtn.onclick = function(e) {
                    e.preventDefault();
                    doSearch();
                };
            }

            // Result listener (delegation)
            var searchResults = document.getElementById('search-results');
            if (searchResults) {
                searchResults.onclick = function(e) {
                    var btn = e.target.closest('.btn-add');
                    if (!btn) return;
                    if (btn.dataset.type === 'playlist') {
                        loadPlaylist(btn.dataset.id);
                    } else {
                        addToQueue(btn.dataset.id, btn.dataset.title, btn.dataset.author, btn.dataset.thumb);
                    }
                };
            }
        });

        // Connection Monitor
        db.ref(".info/connected").on("value", function(snap) {
            var banner = document.getElementById('offline-banner');
            if (banner) banner.style.display = snap.val() ? 'none' : 'block';
        });

        function switchDiscovery(tab) {
            var isSearch = tab === 'search';
            document.getElementById('pane-search').style.display = isSearch ? 'block' : 'none';
            document.getElementById('pane-featured').style.display = isSearch ? 'none' : 'flex';
            
            document.getElementById('tab-btn-search').style.background = isSearch ? 'var(--bar-gold)' : '#333';
            document.getElementById('tab-btn-search').style.color = isSearch ? 'black' : 'white';
            
            document.getElementById('tab-btn-featured').style.background = isSearch ? '#333' : 'var(--bar-gold)';
            document.getElementById('tab-btn-featured').style.color = isSearch ? 'white' : 'black';

            if (tab === 'featured') populateFeatured();
        }

        function populateFeatured() {
            var listEl = document.getElementById('featured-list');
            if (!listEl || listEl.children.length > 0) return;

            for (var i = 0; i < FEATURED_PLAYLISTS.length; i++) {
                var pl = FEATURED_PLAYLISTS[i];
                var div = document.createElement('div');
                div.className = 'result-item';
                div.style.padding = "10px";
                div.innerHTML = 
                    '<div class="result-info">' +
                        '<div class="result-title">[FEATURED] ' + pl.title + '</div>' +
                        '<div class="result-channel">Curated Playlist</div>' +
                    '</div>' +
                    '<button class="btn-add" onclick="loadPlaylist(\'' + escAttr(pl.id) + '\')">+</button>';
                listEl.appendChild(div);
            }
        }

        // State Listeners
        function initFirebaseListeners() {
            vRef.child('settings/nowPlaying').on('value', function(snap) {
                var data = snap.val();
                var thumb = document.getElementById('np-thumb');
                var title = document.getElementById('np-title');
                var author = document.getElementById('np-author');
                if (data) {
                    thumb.src = "https://img.youtube.com/vi/" + data.videoId + "/hqdefault.jpg";
                    title.textContent = data.title || 'Unknown';
                    author.textContent = data.author || '--';
                } else {
                    thumb.src = 'images/TAStation-1.JPG';
                    title.textContent = 'Nothing playing';
                    author.textContent = '--';
                }
            });

            vRef.child('settings/captionsEnabled').on('value', function(snap) { 
                document.getElementById('toggle-cc').checked = !!snap.val(); 
            });
            vRef.child('settings/venueName').on('value', function(snap) {
                var name = snap.val() || "THE STATION";
                var displays = document.querySelectorAll('.venue-name-display');
                for (var i = 0; i < displays.length; i++) {
                    displays[i].textContent = name;
                }
                document.title = name + " - Requests";
            });

            // Queue logic
            vRef.child('settings/queue').on('value', function(snap) {
                var queue = snap.val() || [];
                var listEl = document.getElementById('queue-list');
                var countEl = document.getElementById('queue-count');
                countEl.textContent = queue.length > 0 ? "(" + queue.length + ")" : "";
                if (queue.length === 0) {
                    listEl.innerHTML = '<div class="queue-empty" style="text-align:center; padding:20px; opacity:0.3; font-style:italic;">Queue is empty</div>';
                    return;
                }
                listEl.innerHTML = '';
                queue.forEach(function(item, i) {
                    var div = document.createElement('div');
                    div.className = 'queue-item';
                    div.innerHTML = "<img class=\"queue-thumb\" src=\"" + item.thumb + "\">" +
                        "<div class=\"queue-info\"><div class=\"queue-title\">" + escHtml(item.title) + "</div></div>" +
                        "<div class=\"queue-actions\">" +
                        (i === 0 ? "<button class=\"btn-q-play\" data-index=\"" + i + "\">Play Now</button>" : "") +
                        "<button class=\"queue-remove\" data-index=\"" + i + "\">&times;</button></div>";
                    listEl.appendChild(div);
                });
                
                listEl.onclick = function(e) {
                    var removeBtn = e.target.closest('.queue-remove');
                    if (removeBtn) return removeFromQueue(parseInt(removeBtn.dataset.index));
                    var playBtn = e.target.closest('.btn-q-play');
                    if (playBtn) {
                        var idx = parseInt(playBtn.dataset.index);
                        var item = queue[idx];
                        playNow(item.id, item.title, item.author);
                        removeFromQueue(idx);
                    }
                };
                
                rebuildSortable(listEl, queue);
            });
        }

        // ── Actions ──
        function setCaptions(status) {
            vRef.child('settings/playerCommand').set({ action: 'captions', value: status, ts: Date.now() });
            vRef.child('settings/captionsEnabled').set(status);
        }

        function doSearch() {
            var input = document.getElementById('search-input');
            var searchType = document.getElementById('search-type').value;
            var query = input.value.trim();
            if (!query) return;
            input.blur();

            var resultsEl = document.getElementById('search-results');
            var errorEl = document.getElementById('search-error');
            errorEl.style.display = 'none';
            resultsEl.innerHTML = '<div style="text-align:center; padding:40px; opacity:0.5;">Searching...</div>';

            var safeQuery = firebaseSafe(query) + "_" + searchType;
            var cacheRef = db.ref('SEARCH_CACHE/' + safeQuery);

            cacheRef.once('value').then(function(snapshot) {
                var cachedData = snapshot.val();
                if (cachedData && cachedData.items) {
                    renderResults(cachedData.items);
                    return;
                }

                var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&q=' + encodeURIComponent(query) + '&type=' + searchType + '&maxResults=25&key=' + YT_API_KEY;
                if (searchType === 'video') url += '&videoEmbeddable=true';

                return fetch(url)
                    .then(function(res) { return res.json(); })
                    .then(function(data) {
                        if (data.error) {
                            var msg = data.error.message || 'Unknown error';
                            if (data.error.code === 403) msg = 'API key blocked or quota reached. Try again later.';
                            errorEl.textContent = "Search Error: " + msg;
                            errorEl.style.display = 'block';
                            resultsEl.innerHTML = '';
                            return;
                        }

                        if (!data.items || data.items.length === 0) {
                            resultsEl.innerHTML = '<div style="text-align:center; padding:40px; opacity:0.5;">No results found</div>';
                            return;
                        }

                        cacheRef.set({ items: data.items, timestamp: Date.now() });
                        renderResults(data.items);
                    });
            }).catch(function(e) {
                errorEl.textContent = "Search failed. Check your connection.";
                errorEl.style.display = 'block';
                resultsEl.innerHTML = '';
            });
        }

        function renderResults(items) {
            var resultsEl = document.getElementById('search-results');
            resultsEl.innerHTML = '';
            items.forEach(function(item) {
                var isPlaylist = item.id.kind === 'youtube#playlist';
                var id = isPlaylist ? item.id.playlistId : item.id.videoId;
                if (!id) return;
                var title = item.snippet.title;
                var channel = item.snippet.channelTitle;
                var thumb = (item.snippet.thumbnails.medium || item.snippet.thumbnails.default).url;
                var div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = "<img class=\"result-thumb\" src=\"" + thumb + "\">" +
                    "<div class=\"result-info\"><div class=\"result-title\">" + (isPlaylist ? "[PLAYLIST] " : "") + escHtml(title) + "</div>" +
                    "<div class=\"result-channel\">" + escHtml(channel) + "</div></div>" +
                    "<button class=\"btn-add\" data-id=\"" + id + "\" data-title=\"" + escAttr(title) + "\" data-author=\"" + escAttr(channel) + "\" data-thumb=\"" + escAttr(thumb) + "\" data-type=\"" + (isPlaylist ? "playlist" : "video") + "\">+</button>";
                resultsEl.appendChild(div);
            });
        }

        function loadPlaylist(playlistId) {
            showStatus('Loading playlist...');
            var url = 'https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=' + playlistId + '&key=' + YT_API_KEY;
            
            fetch(url)
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.error) {
                        showStatus('Playlist error: ' + data.error.message);
                        return;
                    }
                    if (data.items && data.items.length > 0) {
                        vRef.child('settings/queue').once('value', function(snap) {
                            var queue = snap.val() || [];
                            var newItems = [];
                            for (var i = 0; i < data.items.length; i++) {
                                var item = data.items[i];
                                var vid = item.snippet.resourceId.videoId;
                                newItems.push({
                                    id: vid,
                                    title: item.snippet.title || '',
                                    author: item.snippet.videoOwnerChannelTitle || '',
                                    thumb: 'https://img.youtube.com/vi/' + vid + '/default.jpg'
                                });
                            }
                            vRef.child('settings/queue').set(queue.concat(newItems));
                            showStatus('Queued ' + newItems.length + ' songs');
                        }, function(err) { showStatus('Failed to update queue'); console.error(err); });
                    }
                })
                .catch(function() { showStatus('Failed to load playlist'); });
        }

        function addToQueue(id, title, author, thumb) {
            vRef.child('settings/queue').once('value', function(snap) {
                var queue = snap.val() || [];
                queue.push({ id: id, title: title, author: author, thumb: thumb });
                vRef.child('settings/queue').set(queue);
                showStatus('Added to queue!');
            });
        }

        function playNow(id, title, author) {
            vRef.child('settings/currentVideoId').set(id);
            vRef.child('settings/nowPlaying').set({ videoId: id, title: title || '', author: author || '' });
            showStatus('Playing now...');
        }

        function removeFromQueue(index) {
            vRef.child('settings/queue').once('value', function(snap) {
                var queue = snap.val() || [];
                queue.splice(index, 1);
                vRef.child('settings/queue').set(queue);
            });
        }

        function rebuildSortable(listEl, currentQueue) {
            if (window._sortable) window._sortable.destroy();
            var children = listEl.children;
            for (var i = 0; i < children.length; i++) {
                children[i].dataset.originalIndex = i;
            }
            window._sortable = new Sortable(listEl, {
                handle: '.queue-thumb',
                animation: 150,
                ghostClass: 'sortable-ghost',
                onEnd: function() {
                    var newIndices = [];
                    var items = listEl.children;
                    for (var j = 0; j < items.length; j++) {
                        newIndices.push(parseInt(items[j].dataset.originalIndex));
                    }
                    var newQueue = [];
                    for (var k = 0; k < newIndices.length; k++) {
                        var idx = newIndices[k];
                        if (!isNaN(idx)) newQueue.push(currentQueue[idx]);
                    }
                    if (newQueue.length > 0) vRef.child('settings/queue').set(newQueue);
                }
            });
        }

        function showStatus(msg) {
            var el = document.getElementById('status-msg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(function() { el.style.display = 'none'; }, 2000);
        }

        function firebaseSafe(str) { return str.toLowerCase().trim().replace(/[.#$[\]\/]/g, "_"); }
        function escHtml(str) { var div = document.createElement('div'); div.textContent = str || ''; return div.innerHTML; }
        function escAttr(str) { if (!str) return ""; return str.replace(/'/g, "&apos;").replace(/"/g, "&quot;"); }
        
        var suggestionTimeout;
        function updateSuggestions(query) {
            clearTimeout(suggestionTimeout);
            if (query.length < 2) return;
            suggestionTimeout = setTimeout(function() {
                fetch("https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&q=" + encodeURIComponent(query))
                    .then(function(res) { return res.text(); })
                    .then(function(text) {
                        var match = text.match(/\["(.*?)",\[(.*?)\]\]/);
                        if (match && match[2]) {
                            var items = JSON.parse("[" + match[2] + "]").map(function(i) { return i[0]; });
                            var datalist = document.getElementById('search-suggestions');
                            var html = "";
                            for (var i = 0; i < items.length; i++) {
                                html += "<option value=\"" + escAttr(items[i]) + "\">";
                            }
                            datalist.innerHTML = html;
                        }
                    }).catch(function(e) { console.warn('Suggest fetch failed', e); });
            }, 300);
        }
    </script>
</body>
</html>
