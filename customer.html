<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Requests</title>
    <link rel="manifest" href="manifest-customer.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="images/TAStation-1.JPG">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bar-gold: #ffcc00;
            --bar-red: #ff4444;
            --bar-green: #28a745;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Slim Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: var(--card-bg);
            border-bottom: 1px solid #333;
            flex-shrink: 0;
            height: 50px;
            box-sizing: border-box;
        }

        .venue-name-display { margin: 0; font-size: 0.9rem; color: var(--bar-gold); text-transform: uppercase; letter-spacing: 1px; font-weight: 900; }
        .cc-wrap { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: bold; opacity: 0.8; }

        /* Dashboard Grid */
        .main-layout {
            flex: 1;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 10px;
            padding: 10px;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Full Height Columns */
        .left-col, .right-col {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }

        .card {
            background: var(--card-bg);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card h3 { margin: 0 0 10px 0; font-size: 0.85rem; color: var(--bar-gold); text-transform: uppercase; letter-spacing: 1px; }

        /* Search Area */
        .search-card { flex: 1; }
        .search-box { display: flex; gap: 8px; margin-bottom: 12px; flex-shrink: 0; }
        input[type="search"] { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; font-size: 0.95rem; outline: none; }
        .btn-search { 
            padding: 10px 20px; 
            background: var(--bar-gold); 
            color: black; 
            border: none; 
            border-radius: 8px; 
            font-weight: 900; 
            cursor: pointer; 
            min-width: 60px;
            transition: transform 0.1s, background-color 0.1s;
        }
        .btn-search:active {
            transform: scale(0.95);
            background-color: #e6b800;
        }

        /* Preview Area */
        #now-playing-card {
            flex: 0 0 auto;
            min-height: 45vh;
            justify-content: center;
            background: linear-gradient(180deg, #1e1e1e 0%, #000 100%);
            margin-bottom: 10px;
            padding: 15px;
        }

        #np-container { display: flex; flex-direction: column; gap: 12px; align-items: center; }
        #np-thumb { width: 100%; max-width: 500px; aspect-ratio: 16/9; object-fit: cover; border-radius: 10px; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333; }
        .np-info-wrap { text-align: center; width: 100%; }
        #np-title { font-size: 1.2rem; font-weight: 900; color: var(--bar-gold); margin-bottom: 4px; line-height: 1.2; }
        #np-author { font-size: 0.85rem; opacity: 0.6; }

        /* Queue Area */
        .queue-card { flex: 1; min-height: 0; }

        /* Scrollable Content */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-right: 2px;
        }

        /* Results & Queue Item Styling */
        .result-item, .queue-item { display: flex; gap: 10px; padding: 10px; background: #252525; border-radius: 8px; align-items: center; margin-bottom: 8px; position: relative; }
        .result-thumb { width: 90px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; }
        .result-info { flex: 1; min-width: 0; padding-right: 35px; }
        .result-title { font-size: 0.8rem; font-weight: 600; line-height: 1.3; color: #eee; }
        .result-channel { font-size: 0.7rem; opacity: 0.5; }

        .btn-add { position: absolute; right: 10px; background: var(--bar-gold); color: black; border: none; border-radius: 50%; width: 34px; height: 34px; font-size: 1.4rem; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .queue-item { border-left: 4px solid var(--bar-gold); }
        .queue-item:first-child { background: #2a2a2a; border-left: 4px solid var(--bar-green); }
        .queue-thumb { width: 70px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; cursor: grab; }
        .queue-title { font-size: 0.75rem; font-weight: 500; color: #fff; flex: 1; min-width: 0; }
        .btn-q-play { background: var(--bar-green); color: white; border: none; border-radius: 4px; font-size: 0.6rem; padding: 4px 6px; font-weight: bold; cursor: pointer; }
        .queue-remove { background: none; border: none; color: #ff4444; font-size: 1.2rem; cursor: pointer; padding: 0 5px; }

        /* Toggles */
        .toggle-switch { position: relative; width: 40px; height: 22px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; inset: 0; background: #444; border-radius: 20px; cursor: pointer; transition: 0.2s; }
        .toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.2s; }
        input:checked + .toggle-slider { background: var(--bar-gold); }
        input:checked + .toggle-slider::before { transform: translateX(18px); }

        /* Overlays */
        #lock-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; padding: 40px; }
        #status-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--bar-gold); color: black; padding: 10px 20px; border-radius: 30px; font-weight: bold; box-shadow: 0 5px 20px rgba(0,0,0,0.6); display: none; z-index: 2000; }
        #offline-banner { background: var(--bar-red); color: white; text-align: center; padding: 4px; font-size: 0.7rem; font-weight: bold; display: none; }

        @media (max-width: 850px) {
            .main-layout { grid-template-columns: 1fr; display: flex; flex-direction: column; }
            #now-playing-card { min-height: auto; order: -1; }
            .left-col, .right-col { height: auto; overflow: visible; }
            .search-card, .queue-card { height: 400px; }
        }
    </style>
</head>
<body>

    <div id="offline-banner">CONNECTION LOST - RECONNECTING...</div>

    <div class="top-bar">
        <div style="display:flex; flex-direction:column;">
            <h1 class="venue-name-display" style="margin-bottom:2px;">THE STATION</h1>
            <div style="font-size:0.6rem; opacity:0.7; font-weight:bold; display:flex; align-items:center; gap:5px;">
                CONNECTED: <span id="current-code-display" style="color:var(--bar-gold);">----</span>
                <a href="#" onclick="switchVenue(); return false;" style="color:white; text-decoration:underline; font-size:0.55rem; opacity:0.5;">[SWITCH]</a>
            </div>
        </div>
        <div class="cc-wrap">
            <span>SUBTITLES (CC)</span>
            <label class="toggle-switch">
                <input type="checkbox" id="toggle-cc" onchange="setCaptions(this.checked)">
                <span class="toggle-slider"></span>
            </label>
        </div>
    </div>

    <div class="main-layout">
        <!-- LEFT: SEARCH -->
        <div class="left-col">
            <div class="card search-card">
                <h3>🔍 FIND MUSIC</h3>
                <form id="search-form" class="search-box" action="javascript:void(0);" onsubmit="doSearch(); return false;">
                    <input type="search" id="search-input" placeholder="Search songs..." autocomplete="off" oninput="updateSuggestions(this.value)">
                    <datalist id="search-suggestions"></datalist>
                    <button type="submit" class="btn-search" id="search-btn">GO</button>
                </form>
                <div id="search-error" style="color:var(--bar-red); font-size:0.7rem; margin-bottom:10px; display:none;"></div>
                <div class="scroll-content" id="search-results">
                    <div style="text-align:center; padding:40px; opacity:0.2;">Search for a song to begin!</div>
                </div>
            </div>
        </div>

        <!-- RIGHT: PREVIEW & QUEUE -->
        <div class="right-col">
            <div class="card" id="now-playing-card">
                <h3>🎵 NOW PLAYING</h3>
                <div id="np-container">
                    <img id="np-thumb" src="" alt="">
                    <div class="np-info-wrap">
                        <div id="np-title">Nothing playing</div>
                        <div id="np-author">--</div>
                    </div>
                </div>
            </div>

            <div class="card queue-card">
                <h3>📋 UP NEXT <span id="queue-count" style="opacity:0.5;"></span></h3>
                <div class="scroll-content" id="queue-list">
                    <div class="queue-empty" style="text-align:center; padding:20px; opacity:0.3; font-style:italic;">Queue is empty</div>
                </div>
            </div>
        </div>
    </div>

    <div id="lock-overlay">
        <div style="font-size: 4rem; margin-bottom: 20px;">🔒</div>
        <h2 id="lock-title">QUEUE LOCKED</h2>
        <p id="lock-message">The queue is currently closed by staff.</p>
    </div>

    <div id="status-msg"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <!-- CONFIGURATION -->
    <script src="config.js"></script>

    <script>
        // Standardized Venue ID Logic
        function getVenueId() {
            var urlParams = new URLSearchParams(window.location.search);
            var v = urlParams.get('v');
            if (!v || v === 'DEFAULT') {
                var promptVal = prompt("Enter 4-character Connect Code (shown on TV):");
                if (promptVal) {
                    v = promptVal.toUpperCase();
                    window.location.search = '?v=' + v;
                }
            }
            return v || 'DEFAULT';
        }

        function switchVenue() {
            var current = venueId;
            var promptVal = prompt("Enter new 4-character Connect Code:", current);
            if (promptVal && promptVal.toUpperCase() !== current) {
                window.location.search = '?v=' + promptVal.toUpperCase();
            }
        }

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // YouTube API Key fallback
        if (typeof YT_API_KEY === 'undefined') {
            window.YT_API_KEY = firebaseConfig.apiKey;
        }

        const venueId = getVenueId();
        const vRef = db.ref('venues/' + venueId);

        // Update UI with connection status
        document.addEventListener('DOMContentLoaded', function() {
            const displayEl = document.getElementById('current-code-display');
            if (displayEl) displayEl.textContent = venueId;

            // Search input Enter key
            document.getElementById('search-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    doSearch();
                }
            });
        });

        db.ref(".info/connected").on("value", function(snap) {
            const banner = document.getElementById('offline-banner');
            if (banner) banner.style.display = snap.val() ? 'none' : 'block';
        });



        let karaokeLocked = false;
        let lastCallActive = false;

        function updateLockState() {
            const overlay = document.getElementById('lock-overlay');
            const lockTitle = document.getElementById('lock-title');
            const lockMsg = document.getElementById('lock-message');
            if (lastCallActive) {
                overlay.style.display = 'flex';
                lockTitle.textContent = "LAST CALL";
                lockMsg.innerHTML = "The queue is closed for the night!";
            } else {
                overlay.style.display = 'none';
            }
        }

        vRef.child('settings/lastCallActive').on('value', snap => { lastCallActive = !!snap.val(); updateLockState(); });

        vRef.child('settings/nowPlaying').on('value', snap => {
            const data = snap.val();
            const thumb = document.getElementById('np-thumb');
            const title = document.getElementById('np-title');
            const author = document.getElementById('np-author');
            if (data) {
                thumb.src = `https://img.youtube.com/vi/${data.videoId}/hqdefault.jpg`;
                title.textContent = data.title || 'Unknown';
                author.textContent = data.author || '--';
            } else {
                thumb.src = '';
                title.textContent = 'Nothing playing';
                author.textContent = '--';
            }
        });

        vRef.child('settings/captionsEnabled').on('value', snap => { document.getElementById('toggle-cc').checked = !!snap.val(); });
        vRef.child('settings/venueName').on('value', snap => {
            const name = snap.val() || "THE STATION";
            document.querySelectorAll('.venue-name-display').forEach(el => el.textContent = name);
            document.title = name + " - Requests";
        });

        function setCaptions(status) {
            vRef.child('settings/playerCommand').set({ action: 'captions', value: status, ts: Date.now() });
            vRef.child('settings/captionsEnabled').set(status);
        }

        // Suggestions logic
        let suggestionTimeout;
        function updateSuggestions(query) {
            clearTimeout(suggestionTimeout);
            if (query.length < 2) return;
            suggestionTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&q=${encodeURIComponent(query)}`);
                    const text = await res.text();
                    const match = text.match(/\["(.*?)",\[(.*?)\]\]/);
                    if (match && match[2]) {
                        const items = JSON.parse(`[${match[2]}]`).map(i => i[0]);
                        const datalist = document.getElementById('search-suggestions');
                        datalist.innerHTML = items.map(i => `<option value="${escAttr(i)}">`).join('');
                    }
                } catch (e) {}
            }, 300);
        }

        // Persistent Search Result Listener
        document.getElementById('search-results').onclick = e => {
            const btn = e.target.closest('.btn-add');
            if (btn) addToQueue(btn.dataset.id, btn.dataset.title, btn.dataset.author, btn.dataset.thumb);
        };

        // Helper to make search query safe for Firebase keys
        function firebaseSafe(str) {
            return str.toLowerCase().trim().replace(/[.#$[\]\/]/g, "_");
        }

        // Search
        async function doSearch() {
            var input = document.getElementById('search-input');
            var query = input.value.trim();
            if (!query) return;
            input.blur();

            var resultsEl = document.getElementById('search-results');
            var errorEl = document.getElementById('search-error');
            errorEl.style.display = 'none';
            resultsEl.innerHTML = '<div style="text-align:center; padding:40px; opacity:0.5;">Searching...</div>';

            // 1. Check Cache
            const safeQuery = firebaseSafe(query);
            const cacheRef = db.ref('SEARCH_CACHE/' + safeQuery);

            try {
                const snapshot = await cacheRef.once('value');
                const cachedData = snapshot.val();

                if (cachedData && cachedData.items) {
                    console.log('Using cached results for:', query);
                    renderResults(cachedData.items);
                    return;
                }

                // 2. Fetch from YouTube
                var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&q=' + encodeURIComponent(query) + '&type=video&videoEmbeddable=true&maxResults=30&key=' + YT_API_KEY;
                
                const res = await fetch(url);
                const data = await res.json();

                if (data.error) {
                    var originalMsg = data.error.message || 'Unknown error';
                    var msg = originalMsg;
                    if (data.error.code === 403) {
                        if (originalMsg.indexOf('referer') !== -1 || originalMsg.indexOf('referrer') !== -1) {
                            msg = 'API key blocked. Add domain to allowed referrers.';
                        } else if (originalMsg.indexOf('quota') !== -1) {
                            msg = 'Daily search limit reached. Try searching again after 9 PM Hawaii time.';
                        } else {
                            msg = 'YouTube Data API v3 not enabled.';
                        }
                    }
                    errorEl.textContent = "Search Error: " + msg;
                    errorEl.style.display = 'block';
                    resultsEl.innerHTML = '';
                    return;
                }

                if (!data.items || data.items.length === 0) {
                    resultsEl.innerHTML = '<div style="text-align:center; padding:40px; opacity:0.5;">No results found for: ' + query + '</div>';
                    return;
                }

                // Save to Cache
                cacheRef.set({
                    items: data.items,
                    timestamp: Date.now()
                });

                renderResults(data.items);

            } catch (e) {
                console.error('Search error:', e);
                resultsEl.innerHTML = '<div style="color:red; text-align:center;">Error searching. Check your connection.</div>';
            }
        }

        function renderResults(items) {
            var resultsEl = document.getElementById('search-results');
            resultsEl.innerHTML = '';
            items.forEach(function(item) {
                var id = item.id.videoId;
                var title = item.snippet.title;
                var channel = item.snippet.channelTitle;
                var thumb = (item.snippet.thumbnails.medium || item.snippet.thumbnails.default).url;
                var div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `
                    <img class="result-thumb" src="${thumb}">
                    <div class="result-info">
                        <div class="result-title">${escHtml(title)}</div>
                        <div class="result-channel">${escHtml(channel)}</div>
                    </div>
                    <button class="btn-add" data-id="${id}" data-title="${escAttr(title)}" data-author="${escAttr(channel)}" data-thumb="${thumb}">+</button>
                `;
                resultsEl.appendChild(div);
            });
        }


        // Add an explicit click listener to the button as a fallback
        document.getElementById('search-btn').onclick = function(e) {
            e.preventDefault();
            doSearch();
        };

        function addToQueue(id, title, author, thumb) {
            vRef.child('settings/queue').once('value', snap => {
                const queue = snap.val() || [];
                queue.push({ id, title, author, thumb });
                vRef.child('settings/queue').set(queue);
                showStatus('Added to queue!');
            });
        }

        function playNow(id, title, author) {
            vRef.child('settings/currentVideoId').set(id);
            vRef.child('settings/nowPlaying').set({ videoId: id, title: title || '', author: author || '' });
            showStatus('Playing now...');
        }

        function removeFromQueue(index) {
            vRef.child('settings/queue').once('value', snap => {
                const queue = snap.val() || [];
                queue.splice(index, 1);
                vRef.child('settings/queue').set(queue);
            });
        }

        vRef.child('settings/queue').on('value', snap => {
            const queue = snap.val() || [];
            const listEl = document.getElementById('queue-list');
            const countEl = document.getElementById('queue-count');
            countEl.textContent = queue.length > 0 ? `(${queue.length})` : '';
            if (queue.length === 0) {
                listEl.innerHTML = '<div class="queue-empty" style="text-align:center; padding:20px; opacity:0.3; font-style:italic;">Queue is empty</div>';
                return;
            }
            listEl.innerHTML = '';
            queue.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'queue-item';
                div.innerHTML = `
                    <img class="queue-thumb" src="${item.thumb}">
                    <div class="queue-info">
                        <div class="queue-title">${escHtml(item.title)}</div>
                    </div>
                    <div class="queue-actions">
                        ${i === 0 ? `<button class="btn-q-play" data-index="${i}">Play Now</button>` : ''}
                        <button class="queue-remove" data-index="${i}">&times;</button>
                    </div>
                `;
                listEl.appendChild(div);
            });
            listEl.onclick = e => {
                const removeBtn = e.target.closest('.queue-remove');
                if (removeBtn) return removeFromQueue(parseInt(removeBtn.dataset.index));
                const playBtn = e.target.closest('.btn-q-play');
                if (playBtn) {
                    const idx = parseInt(playBtn.dataset.index);
                    const item = queue[idx];
                    playNow(item.id, item.title, item.author);
                    removeFromQueue(idx);
                }
            };
            rebuildSortable(listEl, queue);
        });

        function rebuildSortable(listEl, currentQueue) {
            if (window._sortable) window._sortable.destroy();
            Array.from(listEl.children).forEach((child, i) => child.dataset.originalIndex = i);
            window._sortable = new Sortable(listEl, {
                handle: '.queue-thumb',
                animation: 150,
                ghostClass: 'sortable-ghost',
                onEnd: function() {
                    const newIndices = Array.from(listEl.children).map(el => parseInt(el.dataset.originalIndex));
                    const validIndices = newIndices.filter(n => !isNaN(n));
                    const newQueue = validIndices.map(idx => currentQueue[idx]);
                    vRef.child('settings/queue').set(newQueue);
                }
            });
        }

        function showStatus(msg) {
            const el = document.getElementById('status-msg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 2000);
        }

        function escHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        function escAttr(str) {
            if (!str) return "";
            return str.replace(/'/g, "&apos;").replace(/"/g, "&quot;");
        }
    </script>
    <div style="text-align: center; font-size: 10px; opacity: 0.2; padding: 10px; font-family: monospace;">v1.2.0 (2026-03-15 11:55)</div>
</body>
</html>
