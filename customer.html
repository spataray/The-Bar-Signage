<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T.A. Station - Customer Queue</title>
    <link rel="manifest" href="manifest-customer.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="images/TAStation-1.JPG">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bar-gold: #ffcc00;
            --bar-red: #ff4444;
            --bar-green: #28a745;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 10px;
            text-align: center;
            background: var(--card-bg);
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        h1 { margin: 0; font-size: 1.1rem; color: var(--bar-gold); text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { font-size: 0.65rem; opacity: 0.6; margin-top: 2px; }

        .container {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
        }

        .card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
        }

        .card h3 { margin: 0 0 12px 0; font-size: 0.9rem; color: var(--bar-gold); display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; }

        /* Hero Preview (Now Playing) */
        #now-playing-card {
            min-height: 40vh; /* Reduced from 60vh to make room for columns */
            flex-shrink: 0;
            justify-content: space-between;
        }

        #np-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
            justify-content: center;
            align-items: center;
        }

        #np-thumb {
            width: 100%;
            max-width: 480px;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 12px;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid #333;
        }

        .np-info-wrap { text-align: center; width: 100%; }
        #np-title { font-size: 1.2rem; font-weight: 900; color: var(--bar-gold); margin-bottom: 5px; line-height: 1.2; }
        #np-author { font-size: 0.9rem; opacity: 0.6; }

        /* Two Column Layout */
        .bottom-sections {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            overflow: hidden; /* Important for inner scroll */
        }

        .scroll-card {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .scroll-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Search Section */
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        input[type="search"] {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #000;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }

        .btn-search {
            padding: 0 12px;
            background: var(--bar-gold);
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .result-item {
            display: flex;
            gap: 10px;
            padding: 10px;
            background: #252525;
            border-radius: 8px;
            align-items: center;
            margin-bottom: 8px;
            position: relative;
        }

        .result-thumb {
            width: 90px;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 4px;
        }

        .result-info {
            flex: 1;
            min-width: 0;
            padding-right: 35px; /* Room for + button */
        }

        .result-title { font-size: 0.8rem; font-weight: 600; line-height: 1.3; }
        .result-channel { font-size: 0.7rem; opacity: 0.5; margin-top: 2px; }

        .btn-add {
            position: absolute;
            right: 10px;
            background: var(--bar-gold);
            color: black;
            border: none;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            font-size: 1.4rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }

        /* Queue Section */
        .queue-item {
            display: flex;
            gap: 10px;
            padding: 10px;
            background: #252525;
            border-radius: 8px;
            align-items: center;
            border-left: 4px solid var(--bar-gold);
            margin-bottom: 8px;
        }

        /* Highlight first item */
        .queue-item:first-child {
            background: #2a2a2a;
            border-left: 4px solid var(--bar-green);
        }

        .queue-thumb {
            width: 70px;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 4px;
            cursor: grab;
        }

        .queue-info { flex: 1; min-width: 0; }
        .queue-title { font-size: 0.8rem; font-weight: 500; }

        .queue-actions {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .btn-q-play {
            background: var(--bar-green);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.65rem;
            padding: 4px 8px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .queue-remove {
            background: none;
            border: none;
            color: #ff4444;
            font-size: 1.2rem;
            cursor: pointer;
            align-self: flex-end;
        }

        .queue-empty { text-align: center; padding: 20px; opacity: 0.4; font-style: italic; font-size: 0.85rem; }

        /* Locked Overlay */
        #lock-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            text-align: center;
            padding: 40px;
        }
        #lock-overlay h2 { color: var(--bar-gold); margin-bottom: 10px; }
        #lock-overlay p { opacity: 0.7; line-height: 1.5; }

        /* Toggle switches */
        .toggle-switch { position: relative; width: 50px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; inset: 0; background: #444; border-radius: 20px; cursor: pointer; transition: 0.2s; }
        .toggle-slider::before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.2s; }
        input:checked + .toggle-slider { background: var(--bar-gold); }
        input:checked + .toggle-slider::before { transform: translateX(24px); }

        /* Status Toast */
        #status-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bar-gold);
            color: black;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none;
            z-index: 2000;
        }

        #offline-banner { background: var(--bar-red); color: white; text-align: center; padding: 5px; font-size: 0.7rem; font-weight: bold; display: none; }

        @media (max-width: 600px) {
            .bottom-sections { grid-template-columns: 1fr; overflow-y: auto; }
            .scroll-card { overflow: visible; }
            .scroll-content { overflow: visible; }
            #now-playing-card { min-height: auto; }
        }
    </style>
</head>
<body>

    <div id="offline-banner">CONNECTION LOST - RECONNECTING...</div>

    <header>
        <h1 class="venue-name-display">T.A. Station</h1>
        <div class="subtitle">KARAOKE & MUSIC QUEUE</div>
    </header>

    <div class="container">
        <!-- NOW PLAYING HERO -->
        <div class="card" id="now-playing-card">
            <h3>&#127925; NOW PLAYING</h3>
            <div id="np-container">
                <img id="np-thumb" src="" alt="">
                <div class="np-info-wrap">
                    <div id="np-title">Nothing playing</div>
                    <div id="np-author">--</div>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #333; padding-top: 10px; margin-top: 10px;">
                <div style="font-size: 0.85rem; font-weight: 600;">&#128172; Subtitles (CC)</div>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle-cc" onchange="setCaptions(this.checked)">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>

        <div class="bottom-sections">
            <!-- SEARCH COLUMN -->
            <div class="card scroll-card">
                <h3>&#128269; FIND A SONG</h3>
                <div class="search-box">
                    <input type="search" id="search-input" placeholder="Search YouTube..." enterkeyhint="search">
                    <button class="btn-search" onclick="doSearch()">GO</button>
                </div>
                <div id="search-error" style="color:var(--bar-red); font-size:0.75rem; margin-bottom:10px; display:none;"></div>
                <div class="scroll-content" id="search-results"></div>
            </div>

            <!-- QUEUE COLUMN -->
            <div class="card scroll-card">
                <h3>&#128203; UP NEXT <span id="queue-count" style="opacity:0.5; font-size:0.75rem;"></span></h3>
                <div class="scroll-content" id="queue-list">
                    <div class="queue-empty">Queue is empty</div>
                </div>
            </div>
        </div>
    </div>

    <div id="lock-overlay">
        <div style="font-size: 4rem; margin-bottom: 20px;">🔒</div>
        <h2 id="lock-title">QUEUE LOCKED</h2>
        <p id="lock-message">The queue is currently closed by staff.<br>Please check back later or ask your server!</p>
    </div>

    <div id="status-msg"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyByZx_LjyqpqOl90XMZFWy4eHBQJklCooc",
            authDomain: "ta-station-remote.firebaseapp.com",
            databaseURL: "https://ta-station-remote-default-rtdb.firebaseio.com",
            projectId: "ta-station-remote",
            storageBucket: "ta-station-remote.firebasestorage.app",
            messagingSenderId: "805160829750",
            appId: "1:805160829750:web:9a2a9e1cbf639562aba997"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ── VENUE ISOLATION ──
        function getVenueId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('v') || 'DEFAULT';
        }
        const venueId = getVenueId();
        const vRef = db.ref('venues/' + venueId);

        const YT_API_KEY = firebaseConfig.apiKey;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('service-worker.js');
            });
        }

        // Connection Monitor
        db.ref(".info/connected").on("value", function(snap) {
            document.getElementById('offline-banner').style.display = snap.val() ? 'none' : 'block';
        });

        // Karaoke & Last Call Lock Monitor
        let karaokeLocked = false;
        let lastCallActive = false;

        function updateLockState() {
            const overlay = document.getElementById('lock-overlay');
            const lockTitle = document.getElementById('lock-title');
            const lockMsg = document.getElementById('lock-message');
            
            if (lastCallActive) {
                overlay.style.display = 'flex';
                lockTitle.textContent = "LAST CALL";
                lockMsg.innerHTML = "We are currently in <b>Last Call</b>.<br>The queue is closed for the night!";
            } else if (karaokeLocked) {
                overlay.style.display = 'flex';
                lockTitle.textContent = "QUEUE LOCKED";
                lockMsg.innerHTML = "The queue is currently <b>Locked</b> by staff.<br>Please check back later or ask your server!";
            } else {
                overlay.style.display = 'none';
            }
        }

        vRef.child('settings/karaokeLock').on('value', function(snap) {
            karaokeLocked = !!snap.val();
            updateLockState();
        });

        vRef.child('settings/lastCallActive').on('value', function(snap) {
            lastCallActive = !!snap.val();
            updateLockState();
        });

        // Now Playing Sync
        vRef.child('settings/nowPlaying').on('value', function(snap) {
            const data = snap.val();
            const thumb = document.getElementById('np-thumb');
            const title = document.getElementById('np-title');
            const author = document.getElementById('np-author');
            
            if (data) {
                thumb.src = `https://img.youtube.com/vi/${data.videoId}/hqdefault.jpg`;
                title.textContent = data.title || 'Unknown';
                author.textContent = data.author || '--';
            } else {
                thumb.src = '';
                title.textContent = 'Nothing playing';
                author.textContent = '--';
            }
        });

        // Caption Sync
        vRef.child('settings/captionsEnabled').on('value', function(snap) {
            document.getElementById('toggle-cc').checked = !!snap.val();
        });

        // Venue Name Sync
        vRef.child('settings/venueName').on('value', function(snap) {
            const name = snap.val() || "T.A. Station";
            document.querySelectorAll('.venue-name-display').forEach(el => {
                el.textContent = name;
            });
            document.title = name + " - Customer Queue";
        });

        function setCaptions(status) {
            vRef.child('settings/playerCommand').set({ action: 'captions', value: status, ts: Date.now() });
            vRef.child('settings/captionsEnabled').set(status);
        }

        // Search logic
        document.getElementById('search-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doSearch();
        });

        async function doSearch() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;

            const resultsEl = document.getElementById('search-results');
            const errorEl = document.getElementById('search-error');
            errorEl.style.display = 'none';
            resultsEl.innerHTML = '<div style="text-align:center; padding:20px; opacity:0.5;">Searching...</div>';

            try {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&videoEmbeddable=true&maxResults=15&key=${YT_API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.error) {
                    if (data.error.code === 403) {
                        const msg = data.error.message || '';
                        errorEl.textContent = (msg.indexOf('referer') !== -1 || msg.indexOf('referrer') !== -1)
                            ? 'Search blocked. Check Google Cloud domain authorization.'
                            : 'YouTube API not enabled.';
                    } else {
                        errorEl.textContent = 'Search error: ' + data.error.message;
                    }
                    errorEl.style.display = 'block';
                    resultsEl.innerHTML = '';
                    return;
                }

                resultsEl.innerHTML = '';
                if (!data.items || data.items.length === 0) {
                    resultsEl.innerHTML = '<div style="text-align:center; padding:20px; opacity:0.5;">No results found</div>';
                    return;
                }

                data.items.forEach(item => {
                    const id = item.id.videoId;
                    const title = item.snippet.title;
                    const channel = item.snippet.channelTitle;
                    const thumb = (item.snippet.thumbnails.medium || item.snippet.thumbnails.default).url;

                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `
                        <img class="result-thumb" src="${thumb}">
                        <div class="result-info">
                            <div class="result-title">${escHtml(title)}</div>
                            <div class="result-channel">${escHtml(channel)}</div>
                        </div>
                        <button class="btn-add" data-id="${id}" data-title="${escAttr(title)}" data-author="${escAttr(channel)}" data-thumb="${thumb}">+</button>
                    `;
                    resultsEl.appendChild(div);
                });

                // Use event delegation for Add button
                resultsEl.onclick = function(e) {
                    const btn = e.target.closest('.btn-add');
                    if (!btn) return;
                    addToQueue(btn.dataset.id, btn.dataset.title, btn.dataset.author, btn.dataset.thumb);
                };

            } catch (err) {
                errorEl.textContent = "Network error. Check connection.";
                errorEl.style.display = 'block';
                resultsEl.innerHTML = '';
            }
        }

        function addToQueue(id, title, author, thumb) {
            vRef.child('settings/queue').once('value', function(snap) {
                const queue = snap.val() || [];
                queue.push({ id, title, author, thumb });
                vRef.child('settings/queue').set(queue);
                showStatus('Added to queue!');
            });
        }

        function playNow(id, title, author) {
            vRef.child('settings/currentVideoId').set(id);
            vRef.child('settings/nowPlaying').set({
                videoId: id,
                title: title || '',
                author: author || ''
            });
            showStatus('Playing: ' + (title || id));
        }

        function removeFromQueue(index) {
            vRef.child('settings/queue').once('value', function(snap) {
                const queue = snap.val() || [];
                queue.splice(index, 1);
                vRef.child('settings/queue').set(queue);
            });
        }

        // Sync Queue
        vRef.child('settings/queue').on('value', function(snap) {
            const queue = snap.val() || [];
            const listEl = document.getElementById('queue-list');
            const countEl = document.getElementById('queue-count');
            countEl.textContent = queue.length > 0 ? `(${queue.length})` : '';

            if (queue.length === 0) {
                listEl.innerHTML = '<div class="queue-empty">Queue is empty</div>';
                return;
            }

            listEl.innerHTML = '';
            queue.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'queue-item';
                div.innerHTML = `
                    <img class="queue-thumb" src="${item.thumb}">
                    <div class="queue-info">
                        <div class="queue-title">${escHtml(item.title)}</div>
                    </div>
                    <div class="queue-actions">
                        ${i === 0 ? `<button class="btn-q-play" data-index="${i}">Play Now</button>` : ''}
                        <button class="queue-remove" data-index="${i}">&times;</button>
                    </div>
                `;
                listEl.appendChild(div);
            });

            listEl.onclick = function(e) {
                const removeBtn = e.target.closest('.queue-remove');
                if (removeBtn) {
                    removeFromQueue(parseInt(removeBtn.dataset.index));
                    return;
                }
                const playBtn = e.target.closest('.btn-q-play');
                if (playBtn) {
                    const idx = parseInt(playBtn.dataset.index);
                    const item = queue[idx];
                    playNow(item.id, item.title, item.author);
                    // Also remove from queue since it's playing now
                    removeFromQueue(idx);
                }
            };

            rebuildSortable(listEl, queue);
        });

        function rebuildSortable(listEl, currentQueue) {
            if (window._sortable) window._sortable.destroy();
            Array.from(listEl.children).forEach((child, i) => {
                child.dataset.originalIndex = i;
            });

            window._sortable = new Sortable(listEl, {
                handle: '.queue-thumb',
                animation: 150,
                ghostClass: 'sortable-ghost',
                onEnd: function() {
                    const newIndices = Array.from(listEl.children).map(el => parseInt(el.dataset.originalIndex));
                    // Filter out invalid indices (like if there was an empty div)
                    const validIndices = newIndices.filter(n => !isNaN(n));
                    const newQueue = validIndices.map(idx => currentQueue[idx]);
                    vRef.child('settings/queue').set(newQueue);
                }
            });
        }

        function showStatus(msg) {
            const el = document.getElementById('status-msg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 2000);
        }

        function escHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function escAttr(str) {
            if (!str) return "";
            return str.replace(/'/g, "&apos;").replace(/"/g, "&quot;");
        }
    </script>
</body>
</html>
